the flake bundles Python + PyYAML, so you do not install anything else.", "execs": []}, {"md": "## Step 1: Meet the CLI\n\n`doctest` has three subcommands: `run` (execute a spec), `generate` (render\nit to Markdown), and `clean` (strip an executed tree back to source). You\ninvoke it through its flake \u2014 nothing to install.", "execs": []}, {"md": "### 1.1 Confirm doctest is reachable\n\nRun the CLI with no arguments. It prints usage and exits non-zero, so we\nappend `|| true` to let the doc-test continue and assert on the banner:\n\n```bash\ndoctest\n```\n\nThroughout this tutorial, `doctest \u2026` in the rendered commands means\n`nix run github:logos-co/logos-doctest -- \u2026`.", "execs": [{"kind": "run", "cmd": "nix run github:logos-co/logos-doctest/5571432005cd1ff6dbb431b31a9ba99e22e09e7c -- 2>&1 || true", "status": "pass", "exit_code": 0, "output": "unpacking 'github:logos-co/logos-doctest/5571432005cd1ff6dbb431b31a9ba99e22e09e7c' into the Git cache...\nusage: doctest [-h] {run,generate,clean} ...\ndoctest: error: the following arguments are required: command\n", "note": ""}]}, {"md": "## Step 2: Write your first spec\n\nA spec is YAML with a top-level `name`, an `output` filename (used by\n`generate`), and an ordered list of `sections`, each holding ordered\n`steps`. We will write the smallest useful spec: it creates a file, reads\nit back, and asserts on the output.", "execs": []}, {"md": "### 2.1 Create greeting.test.yaml\n\nThe `file` step writes a file during `run` (and shows it as a code block\nwhen rendered). The `run` step executes a command; its `expect_contains`\nlist asserts that each string appears in the command's output. The\n`check_file` step asserts a path exists.\n\n```yaml\nname: \"A greeting\"\noutput: greeting.md\n\nintro: |\n  The smallest useful spec: write a file, read it back, assert on it.\n\nsections:\n  - title: \"Write and verify a greeting\"\n    step: true\n    steps:\n      - title: \"Write greeting.txt\"\n        file:\n          path: greeting.txt\n          language: text\n          content: |\n            Hello from an inner spec!\n\n      - title: \"Read it back and assert\"\n        run: \"cat greeting.txt\"\n        expect_contains:\n          - \"Hello from an inner spec!\"\n\n      - title: \"Confirm the file exists\"\n        check_file: \"greeting.txt\"\n```\n\nThree step types, three jobs: `file` produces an artifact, `run`\nexercises it, `check_file` confirms it. That is the whole core loop.", "execs": [{"kind": "file", "cmd": "write greeting.test.yaml", "status": "pass", "note": "Wrote greeting.test.yaml"}]}, {"md": "## Step 3: Run the spec\n\n`doctest run` executes the spec in an isolated temporary directory, walking\nsections and steps top to bottom and checking every assertion as it goes.", "execs": []}, {"md": "### 3.1 Execute it with --verbose\n\n`--verbose` echoes each command as it runs. Watch for the `PASS` lines\nand the final results summary:\n\n```bash\ndoctest run greeting.test.yaml --verbose\n```\n\nTwo steps asserted (the `run` and the `check_file`); the `file` step\nwrites without asserting. A run where every assertion holds exits `0`;\nany failure makes `doctest run` exit non-zero, which is what lets CI\nfail when the docs drift from reality.", "execs": [{"kind": "run", "cmd": "nix run github:logos-co/logos-doctest/5571432005cd1ff6dbb431b31a9ba99e22e09e7c -- run greeting.test.yaml --verbose", "status": "pass", "exit_code": 0, "output": "=================================================================\n Doctest: A greeting\n=================================================================\n\n  spec     : /private/tmp/doctest-test-dbwq1ibw/greeting.test.yaml\n  workdir  : /tmp/doctest-test-f42ackv_\n  platform : Darwin (ext=dylib)\n  release  : (none)\n\n-----------------------------------------------------------------\n Section: Write and verify a greeting\n-----------------------------------------------------------------\n  wrote   greeting.txt\n        cmd: cat greeting.txt\n  PASS  Read it back and assert\n  PASS  Confirm the file exists\n\n\n=================================================================\n Results: 2 passed, 0 failed, 0 skipped (of 2 run)\n=================================================================\n\n", "note": ""}]}, {"md": "## Step 4: Render the spec\n\nThe same spec that just *ran* can be *rendered* to a Markdown tutorial with\n`doctest generate`. Because it is the identical file, the prose and the\ncommands in the docs cannot disagree with what executes.", "execs": []}, {"md": "### 4.1 Generate Markdown\n\nRender `greeting.test.yaml` to `greeting.md`:\n\n```bash\ndoctest generate greeting.test.yaml -o greeting.md\n```", "execs": [{"kind": "run", "cmd": "nix run github:logos-co/logos-doctest/5571432005cd1ff6dbb431b31a9ba99e22e09e7c -- generate greeting.test.yaml -o greeting.md", "status": "pass", "exit_code": 0, "output": "Generated: /private/tmp/doctest-test-dbwq1ibw/greeting.md\n", "note": ""}]}, {"md": "### 4.2 Confirm the Markdown was written", "execs": [{"kind": "check_file", "cmd": "check file: greeting.md", "status": "pass", "note": "Found: /tmp/doctest-test-dbwq1ibw/greeting.md"}]}, {"md": "### 4.3 Inspect the rendered tutorial\n\nThe rendered file carries the spec's `name` as its title and the file's\ncontents as a fenced code block \u2014 the documentation, generated from the\nthing that was just verified:\n\n```bash\ncat greeting.md\n```\n\nYou have now closed the loop: one YAML file, executed for correctness\nand rendered for humans. Every other `doctest` feature \u2014 chaining,\nreports, the live TUI, release pinning \u2014 builds on exactly this.", "execs": [{"kind": "run", "cmd": "cat greeting.md", "status": "pass", "exit_code": 0, "output": "# A greeting\n\nThe smallest useful spec: write a file, read it back, assert on it.\n\n## Step 1: Write and verify a greeting\n\n### 1.1 Write greeting.txt\n\n```text\nHello from an inner spec!\n```\n\n### 1.2 Read it back and assert\n\n```bash\ncat greeting.txt\n```\n\n### 1.3 Confirm the file exists\n", "note": ""}]}]}, {"meta": {"name": "Rendering, reports, and failures", "platform": "Darwin (ext=dylib)", "release": "(none)"}, "rows": [{"md": "# Rendering, reports, and failures\n\nThe first tutorial covered the `run` / `generate` loop. This one goes deeper on\nthe *rendering* side: how to show readers a clean command while executing a\ndifferent one (`code_block`), how to capture an entire run as a shareable HTML\n**report**, and how `--continue-on-fail` changes what happens when an assertion\nfails. As before, every command here is run by the outer `doctest`, and inside\nit we author and drive a second spec.\n\n**What you'll build:** A spec with display-only command blocks, plus an HTML report of a run that contains a deliberate failure.\n\n**What you'll learn:**\n\n- How `code_block` shows a tidy command while `run` executes the real one\n- How `post_text` adds explanation after a step's action\n- How `--report` writes a self-contained two-column HTML report\n- How a failing `expect_contains` is reported, and its effect on the exit code\n- How `--continue-on-fail` walks the whole spec instead of stopping early\n\n## Prerequisites\n\n- **Nix** with flakes enabled (see the first tutorial). The `doctest` flake\nbundles everything else.", "execs": []}, {"md": "## Step 1: Display vs. execution with code_block\n\nDuring `run`, a step's `run:` value is what executes. But the command that\nis convenient to *run* is not always the one that is clearest to *read* \u2014 a\nrun might use an absolute path, a `|| true` guard, or shell plumbing. The\n`code_block:` field overrides what `generate` shows, while `run:` stays the\nthing that executes.", "execs": []}, {"md": "### 1.1 Write a spec that separates the two\n\nHere the inner step *runs* a command with extra shell noise but *renders*\na clean one. `post_text` adds a note after the command in the output.\n\n```yaml\nname: \"Rendering details\"\noutput: render.md\n\nsections:\n  - title: \"A friendly command\"\n    step: true\n    steps:\n      - title: \"Print the date\"\n        run: \"date '+%Y' > /dev/null && echo 'the year is now'\"\n        code_block: \"date '+%Y'\"\n        expect_contains:\n          - \"the year is now\"\n        post_text: |\n          The command above is what readers see; the spec actually ran\n          a slightly different line to keep this example deterministic.\n```", "execs": [{"kind": "file", "cmd": "write render.test.yaml", "status": "pass", "note": "Wrote render.test.yaml"}]}, {"md": "### 1.2 Run it (executes the real command)\n\n```bash\ndoctest run render.test.yaml --verbose\n```", "execs": [{"kind": "run", "cmd": "nix run github:logos-co/logos-doctest/5571432005cd1ff6dbb431b31a9ba99e22e09e7c -- run render.test.yaml --verbose", "status": "pass", "exit_code": 0, "output": "=================================================================\n Doctest: Rendering details\n=================================================================\n\n  spec     : /private/tmp/doctest-test-i0jek60m/render.test.yaml\n  workdir  : /tmp/doctest-test-qy1tia9y\n  platform : Darwin (ext=dylib)\n  release  : (none)\n\n-----------------------------------------------------------------\n Section: A friendly command\n-----------------------------------------------------------------\n        cmd: date '+%Y' > /dev/null && echo 'the year is now'\n  PASS  Print the date\n\n\n=================================================================\n Results: 1 passed, 0 failed, 0 skipped (of 1 run)\n=================================================================\n\n", "note": ""}]}, {"md": "### 1.3 Generate it (shows the clean command)\n\nIn the rendered Markdown the code block is the *display* command, and the\n`post_text` follows it \u2014 the executed plumbing never leaks into the docs:\n\n```bash\ndoctest generate render.test.yaml -o render.md\n```\n\nNote that `date '+%Y' > /dev/null && echo \u2026` (the executed line) does\n**not** appear \u2014 only the `code_block` does.", "execs": [{"kind": "run", "cmd": "nix run github:logos-co/logos-doctest/5571432005cd1ff6dbb431b31a9ba99e22e09e7c -- generate render.test.yaml -o render.md && cat render.md", "status": "pass", "exit_code": 0, "output": "Generated: /private/tmp/doctest-test-i0jek60m/render.md\n# Rendering details\n\n## Step 1: A friendly command\n\n### 1.1 Print the date\n\n```bash\ndate '+%Y'\n```\n\nThe command above is what readers see; the spec actually ran\na slightly different line to keep this example deterministic.\n", "note": ""}]}, {"md": "## Step 2: Capture a run as an HTML report\n\n`--report PATH` writes a self-contained HTML file with two columns per step:\nthe rendered documentation on the left, and the commands actually executed\nplus their output (with pass/fail badges) on the right. It is the artifact\nCI publishes so reviewers can see exactly what ran.", "execs": []}, {"md": "### 2.1 Produce a report\n\n```bash\ndoctest run render.test.yaml --report report.html\n```", "execs": [{"kind": "run", "cmd": "nix run github:logos-co/logos-doctest/5571432005cd1ff6dbb431b31a9ba99e22e09e7c -- run render.test.yaml --report report.html", "status": "pass", "exit_code": 0, "output": "=================================================================\n Doctest: Rendering details\n=================================================================\n\n  spec     : /private/tmp/doctest-test-i0jek60m/render.test.yaml\n  workdir  : /tmp/doctest-test-l3ugun8l\n  platform : Darwin (ext=dylib)\n  release  : (none)\n\n-----------------------------------------------------------------\n Section: A friendly command\n-----------------------------------------------------------------\n  PASS  Print the date\n\n\n=================================================================\n Results: 1 passed, 0 failed, 0 skipped (of 1 run)\n=================================================================\n\n  report : /private/tmp/doctest-test-i0jek60m/report.html\n", "note": ""}]}, {"md": "### 2.2 Confirm the report file exists", "execs": [{"kind": "check_file", "cmd": "check file: report.html", "status": "pass", "note": "Found: /tmp/doctest-test-i0jek60m/report.html"}]}, {"md": "### 2.3 Peek at the report\n\nThe report is a standalone HTML document titled for the run:\n\n```bash\ngrep 'Tutorial Execution Report' report.html\n```", "execs": [{"kind": "run", "cmd": "grep -o 'Tutorial Execution Report' report.html | head -1", "status": "pass", "exit_code": 0, "output": "Tutorial Execution Report\n", "note": ""}]}, {"md": "## Step 3: What happens when an assertion fails\n\nA spec is only useful if it actually fails when reality disagrees with the\ndocs. Here we write a spec whose assertion is wrong on purpose, then observe\ntwo behaviors: the default **fail-fast**, and `--continue-on-fail`.", "execs": []}, {"md": "### 3.1 Write a spec with a wrong assertion\n\n```yaml\nname: \"Deliberately broken\"\noutput: broken.md\n\nsections:\n  - title: \"Mismatched expectation\"\n    step: true\n    steps:\n      - title: \"Echo one thing, expect another\"\n        run: \"echo hello\"\n        expect_contains:\n          - \"this string is not in the output\"\n      - title: \"A second step (only reached with --continue-on-fail)\"\n        run: \"echo second-step-ran\"\n        expect_contains:\n          - \"second-step-ran\"\n```", "execs": [{"kind": "file", "cmd": "write broken.test.yaml", "status": "pass", "note": "Wrote broken.test.yaml"}]}, {"md": "### 3.2 Run it \u2014 the failure is reported and the exit code is non-zero\n\nWe add `|| true` so this doc-test can continue past the inner failure and\nassert on the `FAIL` line. The inner `doctest` still exits non-zero \u2014 that\nnon-zero exit is exactly what fails a CI job:\n\n```bash\ndoctest run broken.test.yaml --continue-on-fail\n```\n\nWith `--continue-on-fail`, the runner walked **both** inner steps: the\nfirst failed and the second still ran and passed \u2014 the summary\n`1 passed, 1 failed` proves it reached the second step. Without that\nflag, `doctest run` stops at the first failure (fail-fast), the right\ndefault for local iteration; `--continue-on-fail` is what you want in CI\nso the report captures the whole run.", "execs": [{"kind": "run", "cmd": "nix run github:logos-co/logos-doctest/5571432005cd1ff6dbb431b31a9ba99e22e09e7c -- run broken.test.yaml --continue-on-fail || true", "status": "pass", "exit_code": 0, "output": "=================================================================\n Doctest: Deliberately broken\n=================================================================\n\n  spec     : /private/tmp/doctest-test-i0jek60m/broken.test.yaml\n  workdir  : /tmp/doctest-test-maelwp5w\n  platform : Darwin (ext=dylib)\n  release  : (none)\n\n-----------------------------------------------------------------\n Section: Mismatched expectation\n-----------------------------------------------------------------\n  FAIL  Echo one thing, expect another\n        expected 'this string is not in the output' not found in output\n        actual:   hello\n  PASS  A second step (only reached with --continue-on-fail)\n\n\n=================================================================\n Results: 1 passed, 1 failed, 0 skipped (of 2 run)\n=================================================================\n\nFailures:\n  FAIL  Echo one thing, expect another\n        expected 'this string is not in the output' not found in output\n        actual:   hello\n\n", "note": ""}]}]}, {"meta": {"name": "Chaining specs and cleaning the output tree", "platform": "Darwin (ext=dylib)", "release": "(none)"}, "rows": [{"md": "# Chaining specs and cleaning the output tree\n\nReal tutorials often come in parts: Part 2 builds on what Part 1 produced. This\ntutorial shows how `requires:` chains specs so a prerequisite runs first in its\nown directory, how `--output-dir` lays the chain out on disk, and how `doctest\nclean` strips an executed tree back to checked-in source. As always, we drive\ninner specs from inside this one.\n\n**What you'll build:** A two-spec chain (a base spec and one that consumes its output), run into a directory you can inspect, then cleaned.\n\n**What you'll learn:**\n\n- How `requires:` declares prerequisite specs, run before the spec that needs them\n- Why chained specs need a `project_name`, and how it names their subdirectory\n- How a later spec references an earlier one's output (`../<project_name>/\u2026`)\n- How `--output-dir` keeps the result on disk instead of a temp dir\n- How `doctest clean` removes build artifacts, with `--dry-run` and `--keep`\n\n## Prerequisites\n\n- **Nix** with flakes enabled (see the first tutorial).", "execs": []}, {"md": "## Step 1: A base spec to build on\n\nChaining is keyed on `project_name`: each spec in a chain runs in a sibling\ndirectory named by its `project_name`. We start with a base spec that simply\nproduces a marker file other specs can consume.", "execs": []}, {"md": "### 1.1 Write base.test.yaml\n\nNote the `project_name: base-project` \u2014 without it, a spec that\nparticipates in a chain is an error.\n\n```yaml\nname: \"Base project\"\noutput: base.md\nproject_name: base-project\n\nsections:\n  - title: \"Produce an artifact\"\n    step: true\n    steps:\n      - title: \"Write a marker file\"\n        file:\n          path: artifact.txt\n          language: text\n          content: |\n            built-by-base-project\n```", "execs": [{"kind": "file", "cmd": "write base.test.yaml", "status": "pass", "note": "Wrote base.test.yaml"}]}, {"md": "## Step 2: A spec that requires the base\n\nThe second spec declares `requires: [base.test.yaml]`. When you run it,\n`doctest` runs the base first (in `base-project/`), then this spec (in\n`consumer-project/`), so it can read the base's output through the sibling\npath `../base-project/`.", "execs": []}, {"md": "### 2.1 Write consumer.test.yaml\n\n```yaml\nname: \"Consumer project\"\noutput: consumer.md\nproject_name: consumer-project\n\nrequires:\n  - base.test.yaml\n\nsections:\n  - title: \"Use the base's artifact\"\n    step: true\n    steps:\n      - title: \"Read the sibling project's output\"\n        run: \"cat ../base-project/artifact.txt\"\n        expect_contains:\n          - \"built-by-base-project\"\n```\n\n`requires:` is resolved **transitively** and de-duplicated: if A requires\nB and B requires C, running A runs C, then B, then A, each once.", "execs": [{"kind": "file", "cmd": "write consumer.test.yaml", "status": "pass", "note": "Wrote consumer.test.yaml"}]}, {"md": "## Step 3: Run the chain into a directory you keep\n\nBy default a run uses a temp directory that is deleted afterwards. With\n`--output-dir DIR`, the directory is created (if missing) and **kept**, and\nfor a chain it becomes the chain root with one subdirectory per project.", "execs": []}, {"md": "### 3.1 Run the consumer (the base runs first)\n\n```bash\ndoctest run consumer.test.yaml --output-dir ./chain-out\n```\n\nBoth specs ran: the base produced its artifact (a `file` step, which\nwrites without asserting), then the consumer read it back across the\nproject boundary and asserted on it \u2014 the one `PASS` in the summary.", "execs": [{"kind": "run", "cmd": "nix run github:logos-co/logos-doctest/5571432005cd1ff6dbb431b31a9ba99e22e09e7c -- run consumer.test.yaml --output-dir ./chain-out", "status": "pass", "exit_code": 0, "output": "=================================================================\n Doctest: Base project\n=================================================================\n\n  spec     : /private/tmp/doctest-test-vfnrqvf6/base.test.yaml\n  workdir  : /private/tmp/doctest-test-vfnrqvf6/chain-out/base-project\n  platform : Darwin (ext=dylib)\n  release  : (none)\n\n-----------------------------------------------------------------\n Section: Produce an artifact\n-----------------------------------------------------------------\n  wrote   artifact.txt\n\n=================================================================\n Doctest: Consumer project\n=================================================================\n\n  spec     : /private/tmp/doctest-test-vfnrqvf6/consumer.test.yaml\n  workdir  : /private/tmp/doctest-test-vfnrqvf6/chain-out/consumer-project\n  platform : Darwin (ext=dylib)\n  release  : (none)\n\n-----------------------------------------------------------------\n Section: Use the base's artifact\n-----------------------------------------------------------------\n  PASS  Read the sibling project's output\n\n  output : /private/tmp/doctest-test-vfnrqvf6/chain-out\n\n=================================================================\n Results: 1 passed, 0 failed, 0 skipped (of 1 run)\n=================================================================\n\n", "note": ""}]}, {"md": "### 3.2 Inspect the on-disk layout\n\nThe chain root holds one directory per `project_name`, each with that\nproject's files:\n\n```bash\nfind ./chain-out -maxdepth 2 -type f\n```", "execs": [{"kind": "run", "cmd": "find ./chain-out -maxdepth 2 -type f | sort", "status": "pass", "exit_code": 0, "output": "./chain-out/base-project/artifact.txt\n", "note": ""}]}, {"md": "## Step 4: Clean the executed tree\n\nAn executed `--output-dir` tree mixes generated source with build artifacts\n(out-links, compiled libraries, `modules/`, logs). `doctest clean` removes\nthe artifacts so what remains is committable source. Preview first with\n`--dry-run`, and spare specific patterns with `--keep`.", "execs": []}, {"md": "### 4.1 Add some artifacts to clean\n\nSimulate what a real build leaves behind:\n\n```bash\ntouch result libdemo.so build.log   # leftover build artifacts\n```", "execs": [{"kind": "run", "cmd": "touch ./chain-out/consumer-project/result ./chain-out/consumer-project/libdemo.so ./chain-out/base-project/build.log", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 4.2 Preview removals with --dry-run\n\n`--dry-run` lists what *would* be removed without touching anything:\n\n```bash\ndoctest clean ./chain-out --dry-run\n```", "execs": [{"kind": "run", "cmd": "nix run github:logos-co/logos-doctest/5571432005cd1ff6dbb431b31a9ba99e22e09e7c -- clean ./chain-out --dry-run", "status": "pass", "exit_code": 0, "output": "  would remove  consumer-project/libdemo.so\n  would remove  consumer-project/result\n  would remove  base-project/build.log\nclean: would remove 3 artifact(s) under /private/tmp/doctest-test-vfnrqvf6/chain-out\n", "note": ""}]}, {"md": "### 4.3 Clean for real, keeping logs\n\nNow remove the artifacts but keep `*.log` files with `--keep`. The\nout-link and the compiled library go; the log stays:\n\n```bash\ndoctest clean ./chain-out --keep '*.log' --verbose\n```", "execs": [{"kind": "run", "cmd": "nix run github:logos-co/logos-doctest/5571432005cd1ff6dbb431b31a9ba99e22e09e7c -- clean ./chain-out --keep '*.log' --verbose", "status": "pass", "exit_code": 0, "output": "  removed  consumer-project/libdemo.so\n  removed  consumer-project/result\nclean: removed 2 artifact(s) under /private/tmp/doctest-test-vfnrqvf6/chain-out\n", "note": ""}]}, {"md": "### 4.4 Confirm what survived\n\nThe generated source and the kept log remain; the build artifacts are\ngone \u2014 a tree you could check in as-is:\n\n```bash\nfind ./chain-out -type f\n```\n\n`result` and `libdemo.so` are no longer listed: `clean` removed them,\n`--keep '*.log'` preserved `build.log`, and the real source survived.", "execs": [{"kind": "run", "cmd": "find ./chain-out -type f | sort", "status": "pass", "exit_code": 0, "output": "./chain-out/base-project/artifact.txt\n./chain-out/base-project/build.log\n", "note": ""}]}]}, {"meta": {"name": "Combined reports and release pinning", "platform": "Darwin (ext=dylib)", "release": "(none)"}, "rows": [{"md": "# Combined reports and release pinning\n\nThe final tutorial covers the two features you reach for when wiring `doctest`\ninto a real project's CI: running **several specs into one report** (so a repo\nwith many `*.test.yaml` files publishes a single artifact with a dropdown), and\nthe **`{release}` placeholder** that lets one spec target either bleeding-edge\nor a pinned release of the repos it builds. We demonstrate both from inside this\nspec.\n\n**What you'll build:** Two inner specs rendered into a single combined HTML report, plus a spec that pins a GitHub URL via {release}.\n\n**What you'll learn:**\n\n- How `doctest run a.yaml b.yaml --report r.html` combines specs into one report\n- Why the combined report has a per-spec dropdown (one entry per spec)\n- How the `{release}` placeholder expands in `run` commands and rendered docs\n- How `--release TAG` overrides the spec's `release:` field at the CLI\n- The recommended `tests/` + `outputs/` project layout for keeping docs honest\n\n## Prerequisites\n\n- **Nix** with flakes enabled (see the first tutorial).", "execs": []}, {"md": "## Step 1: Two specs, one report\n\nA repo usually has more than one spec. Passing them all to a single `doctest\nrun` executes them back-to-back into one `--report`, whose top-right dropdown\nswitches between them \u2014 far tidier than one HTML file per spec.", "execs": []}, {"md": "### 1.1 Write two small specs\n\nTwo independent specs, each a single passing assertion:\n\n```yaml\nname: \"Alpha\"\noutput: alpha.md\nsections:\n  - title: \"Alpha check\"\n    step: true\n    steps:\n      - title: \"Echo alpha\"\n        run: \"echo alpha-ok\"\n        expect_contains:\n          - \"alpha-ok\"\n```", "execs": [{"kind": "file", "cmd": "write alpha.test.yaml", "status": "pass", "note": "Wrote alpha.test.yaml"}]}, {"md": "### 1.2 Write the second spec\n\n```yaml\nname: \"Beta\"\noutput: beta.md\nsections:\n  - title: \"Beta check\"\n    step: true\n    steps:\n      - title: \"Echo beta\"\n        run: \"echo beta-ok\"\n        expect_contains:\n          - \"beta-ok\"\n```", "execs": [{"kind": "file", "cmd": "write beta.test.yaml", "status": "pass", "note": "Wrote beta.test.yaml"}]}, {"md": "### 1.3 Run both into a single report\n\nPass both specs to one `run`. They execute in order and share one report\nfile. `--continue-on-fail` is the CI-friendly choice so the report is\ncomplete even if a spec fails:\n\n```bash\ndoctest run alpha.test.yaml beta.test.yaml --continue-on-fail --report combined.html\n```", "execs": [{"kind": "run", "cmd": "nix run github:logos-co/logos-doctest/5571432005cd1ff6dbb431b31a9ba99e22e09e7c -- run alpha.test.yaml beta.test.yaml --continue-on-fail --report combined.html", "status": "pass", "exit_code": 0, "output": "=================================================================\n Doctest: Alpha\n=================================================================\n\n  spec     : /private/tmp/doctest-test-2oy6ssno/alpha.test.yaml\n  workdir  : /tmp/doctest-test-3q1hipu1\n  platform : Darwin (ext=dylib)\n  release  : (none)\n\n-----------------------------------------------------------------\n Section: Alpha check\n-----------------------------------------------------------------\n  PASS  Echo alpha\n\n=================================================================\n Doctest: Beta\n=================================================================\n\n  spec     : /private/tmp/doctest-test-2oy6ssno/beta.test.yaml\n  workdir  : /tmp/doctest-test-31wdw09y\n  platform : Darwin (ext=dylib)\n  release  : (none)\n\n-----------------------------------------------------------------\n Section: Beta check\n-----------------------------------------------------------------\n  PASS  Echo beta\n\n\n=================================================================\n Results: 2 passed, 0 failed, 0 skipped (of 2 run)\n=================================================================\n\n  report : /private/tmp/doctest-test-2oy6ssno/combined.html\n", "note": ""}]}, {"md": "### 1.4 Confirm the combined report exists", "execs": [{"kind": "check_file", "cmd": "check file: combined.html", "status": "pass", "note": "Found: /tmp/doctest-test-2oy6ssno/combined.html"}]}, {"md": "### 1.5 Both specs are in the dropdown\n\nThe report's spec picker is populated from the embedded run data \u2014 one\nentry per spec. Both names are present in the single file:\n\n```bash\ngrep -o 'Alpha\\|Beta' combined.html | sort -u\n```\n\nOne report, two dropdown entries. (`--output-dir` and `--tui`, by\ncontrast, operate on a single spec \u2014 pass just one to those.)", "execs": [{"kind": "run", "cmd": "grep -o 'Alpha\\|Beta' combined.html | sort -u", "status": "pass", "exit_code": 0, "output": "Alpha\nBeta\n", "note": ""}]}, {"md": "## Step 2: Pinning versions with the {release} placeholder\n\nSpecs that build GitHub repos often want to target a specific release rather\nthan the latest commit. Anywhere a `run` command, `code_block`, or file body\ncontains the release placeholder, `doctest` expands it \u2014 to `/TAG` when a\nrelease is set, or to nothing when it is empty \u2014 so one spec can render either\nbleeding-edge or pinned instructions without editing URLs by hand.\n\nA spec author writes a flake reference such as\n`github:logos-co/logos-module-builder` followed by the placeholder and\n`#with-external-lib`. With no release it stays bare; with `--release demo-v1`\nit becomes `github:logos-co/logos-module-builder/demo-v1#with-external-lib`.\nBelow we prove both, from inside this spec.", "execs": []}, {"md": "### 2.1 Write an inner spec that uses the placeholder\n\nWe generate the inner spec with a heredoc rather than a `file` step. Why?\nThis outer step is *itself* placeholder-expanded, so a literal token typed\nhere would be substituted by the **outer** run before the inner spec ever\nsaw it. Assembling the braces from a shell variable (`LB='{'`) sidesteps\nthat: the written file ends up with a real placeholder for the **inner**\nrun to expand.\n\n```bash\n# Write pinned.test.yaml. LB/RB assemble the brace token so the OUTER\n# run leaves it intact; the written file gets a real placeholder for the\n# inner run to expand.\nLB='{'; RB='}'\ncat > pinned.test.yaml <<EOF\n# ...\nrun: \"echo 'github:logos-co/logos-module-builder${LB}release${RB}#with-external-lib'\"\n# ...\nEOF\n```\n\nThe written `pinned.test.yaml` now holds a real release placeholder in its\n`run:` command \u2014 put there without the outer run substituting it.", "execs": [{"kind": "run", "cmd": "LB='{'; RB='}'\ncat > pinned.test.yaml <<EOF\nname: \"Release placeholder demo\"\noutput: pinned.md\nsections:\n  - title: \"Show the resolved URL\"\n    step: true\n    steps:\n      - title: \"Print a flake reference\"\n        run: \"echo 'github:logos-co/logos-module-builder${LB}release${RB}#with-external-lib'\"\n        expect_contains:\n          - \"logos-module-builder\"\nEOF\n", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 2.2 Confirm the inner spec was written", "execs": [{"kind": "check_file", "cmd": "check file: pinned.test.yaml", "status": "pass", "note": "Found: /tmp/doctest-test-2oy6ssno/pinned.test.yaml"}]}, {"md": "### 2.3 Run the inner spec with no release\n\nWith no release set, the placeholder expands to an empty string and the\nURL points at the default branch:\n\n```bash\ndoctest run pinned.test.yaml --verbose\n```", "execs": [{"kind": "run", "cmd": "nix run github:logos-co/logos-doctest/5571432005cd1ff6dbb431b31a9ba99e22e09e7c -- run pinned.test.yaml --verbose", "status": "pass", "exit_code": 0, "output": "=================================================================\n Doctest: Release placeholder demo\n=================================================================\n\n  spec     : /private/tmp/doctest-test-2oy6ssno/pinned.test.yaml\n  workdir  : /tmp/doctest-test-2ogsa8xw\n  platform : Darwin (ext=dylib)\n  release  : (none)\n\n-----------------------------------------------------------------\n Section: Show the resolved URL\n-----------------------------------------------------------------\n        cmd: echo 'github:logos-co/logos-module-builder#with-external-lib'\n  PASS  Print a flake reference\n\n\n=================================================================\n Results: 1 passed, 0 failed, 0 skipped (of 1 run)\n=================================================================\n\n", "note": ""}]}, {"md": "### 2.4 Run the inner spec with --release\n\n`--release TAG` overrides the spec's `release:` field for the whole run,\nso the very same placeholder now expands to `/TAG`:\n\n```bash\ndoctest run pinned.test.yaml --release demo-v1 --verbose\n```\n\nSame spec, two renderings: `--release demo-v1` pinned the URL to the\n`demo-v1` tag. (To pin a single repo differently from the rest \u2014 for\nexample to build one repo at a CI commit \u2014 use `--release-for REPO=REF`.)", "execs": [{"kind": "run", "cmd": "nix run github:logos-co/logos-doctest/5571432005cd1ff6dbb431b31a9ba99e22e09e7c -- run pinned.test.yaml --release demo-v1 --verbose", "status": "pass", "exit_code": 0, "output": "=================================================================\n Doctest: Release placeholder demo\n=================================================================\n\n  spec     : /private/tmp/doctest-test-2oy6ssno/pinned.test.yaml\n  workdir  : /tmp/doctest-test-lt7_5ih0\n  platform : Darwin (ext=dylib)\n  release  : demo-v1\n\n-----------------------------------------------------------------\n Section: Show the resolved URL\n-----------------------------------------------------------------\n        cmd: echo 'github:logos-co/logos-module-builder/demo-v1#with-external-lib'\n  PASS  Print a flake reference\n\n\n=================================================================\n Results: 1 passed, 0 failed, 0 skipped (of 1 run)\n=================================================================\n\n", "note": ""}]}, {"md": "## Putting it together in a project\n\nThe pattern these four tutorials demonstrate is exactly how a real repo wires\n`doctest` into CI:\n\n- Keep specs in a `doctests/` (or `tests/`) directory, one `*.test.yaml` per\n  topic, each both runnable and renderable.\n- In CI, run them all into one report:\n  `doctest run doctests/*.test.yaml --continue-on-fail --report report.html`,\n  publish the HTML, and let the non-zero exit fail the job when the docs\n  drift from the code.\n- Render the committed Markdown with `doctest generate`, and strip executed\n  output trees with `doctest clean` before checking them in.\n\nThis very directory is that pattern applied to `doctest` itself: the specs\nhere are run by `doctest` in CI, and the tool's own documentation is verified\nby the tool. Inception complete.", "execs": []}]}]}</script>
<script>
  const DATA = JSON.parse(document.getElementById("report-data").textContent);
  if (window.marked) { marked.setOptions({ gfm: true, breaks: false }); }
  const mdToHtml = (s) => window.marked ? marked.parse(s || "") : ("<pre>" + (s || "") + "</pre>");

  const sum = DATA.summary;
  document.getElementById("summary").innerHTML =
    `<span class="pill pass">${sum.passed} passed</span> ` +
    (sum.failed ? `<span class="pill fail">${sum.failed} failed</span> ` : "") +
    (sum.skipped ? `<span class="pill skip">${sum.skipped} skipped</span>` : "");

  const picker = document.getElementById("picker");
  DATA.tutorials.forEach((t, i) => {
    const o = document.createElement("option");
    o.value = i; o.textContent = t.meta.name; picker.appendChild(o);
  });

  function execHtml(e) {
    const badge = `<span class="badge ${e.status}">${e.status.toUpperCase()}</span>`;
    const kind = `<span class="kind">${e.kind}${e.exit_code !== undefined ? " · exit " + e.exit_code : ""}</span>`;
    let h = `<div class="exec"><div class="exec-head">${badge}${kind}</div>`;
    if (e.note) h += `<div class="note">${escapeHtml(e.note)}</div>`;
    if (e.cmd) h += `<pre class="cmd">${escapeHtml(e.cmd)}</pre>`;
    const out = (e.output || "").trim();
    if (out) {
      const long = out.split("\n").length > 12;
      if (long) {
        h += `<details><summary>output (${out.split("\n").length} lines)</summary><pre class="output">${escapeHtml(out)}</pre></details>`;
      } else {
        h += `<pre class="output">${escapeHtml(out)}</pre>`;
      }
    }
    h += `</div>`;
    return h;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
  }

  function render(idx) {
    const t = DATA.tutorials[idx];
    const main = document.getElementById("main");
    main.innerHTML = "";
    const h = document.createElement("div");
    h.className = "tutorial-title";
    h.textContent = t.meta.name + "  —  " + t.meta.platform;
    main.appendChild(h);

    t.rows.forEach(row => {
      const isStructural = row.execs.length === 0 &&
        (/^#\s|^##\s/.test(row.md.trim()));
      const div = document.createElement("div");
      const hasExec = row.execs.length > 0;
      const hasFail = row.execs.some(e => e.status === "fail");
      div.className = "row" + (hasExec ? "" : (isStructural ? " section" : " preamble")) +
        (hasFail ? " has-fail" : "");

      const left = document.createElement("div");
      left.className = "col left";
      left.innerHTML = `<div class="md">${mdToHtml(row.md)}</div>`;
      div.appendChild(left);

      if (hasExec || !isStructural) {
        const right = document.createElement("div");
        right.className = "col right";
        if (hasExec) {
          right.innerHTML = `<div class="col-label">Executed</div>` +
            row.execs.map(execHtml).join("");
        } else {
          right.innerHTML = `<div class="col-label">Executed</div>` +
            `<div class="empty">No commands run for this step.</div>`;
        }
        div.appendChild(right);
      }
      main.appendChild(div);
    });
  }

  picker.addEventListener("change", () => render(+picker.value));
  render(0);
</script>
