  .col { padding: 14px 18px; min-width: 0; }
  .col.left { border-right: 1px solid var(--border); }
  .row.preamble .col.left, .row.section .col.left { border-right: none; }
  .col.right { background: var(--panel); }

  .row.has-fail { border-color: var(--fail); box-shadow: 0 0 0 1px var(--fail); }
  .row.has-fail .col.left { background: rgba(248,81,73,.07); border-right-color: var(--fail); }
  .row.has-fail .col.right { background: rgba(248,81,73,.12); }
  .col-label { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin-bottom: 8px; }

  .md :not(pre) > code { background: rgba(110,118,129,.2); padding: .15em .4em; border-radius: 4px; }
  .md table { border-collapse: collapse; margin: 8px 0; }
  .md th, .md td { border: 1px solid var(--border); padding: 5px 10px; }
  .md blockquote { border-left: 3px solid var(--border); margin: 8px 0; padding: 2px 12px; color: var(--muted); }
  .exec { margin-bottom: 14px; }
  .exec:last-child { margin-bottom: 0; }
  .exec-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .badge { font-size: 11px; font-weight: 700; padding: 1px 8px; border-radius: 4px; }

  .kind { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
  .note { color: var(--muted); font-size: 12.5px; margin-bottom: 6px; }
  pre.cmd { background: var(--code-bg); border: 1px solid var(--border); border-left: 3px solid var(--accent); border-radius: 6px; padding: 10px 12px; margin: 0 0 6px; overflow-x: auto; white-space: pre-wrap; word-break: break-word; }

  pre.cmd, pre.output { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px; line-height: 1.45; }
  .empty { color: var(--muted); font-style: italic; font-size: 12.5px; }

lake bundles Python + PyYAML, so you do not install anything else.", "execs": []}, {"md": "## Step 1: Meet the CLI\n\n`doctest` has three subcommands: `run` (execute a spec), `generate` (render\nit to Markdown), and `clean` (strip an executed tree back to source). You\ninvoke it through its flake \u2014 nothing to install.", "execs": []}, {"md": "### 1.1 Confirm doctest is reachable\n\nRun the CLI with no arguments. It prints usage and exits non-zero, so we\nappend `|| true` to let the doc-test continue and assert on the banner:\n\n```bash\ndoctest\n```\n\nThroughout this tutorial, `doctest \u2026` in the rendered commands means\n`nix run github:logos-co/logos-doctest -- \u2026`.", "execs": [{"kind": "run", "cmd": "nix run github:logos-co/logos-doctest/713a102307e47e8339c6188cbe32aa4bc7b9f2b4 -- 2>&1 || true", "status": "pass", "exit_code": 0, "output": "unpacking 'github:logos-co/logos-doctest/713a102307e47e8339c6188cbe32aa4bc7b9f2b4' into the Git cache...\nusage: doctest [-h] {run,generate,clean} ...\ndoctest: error: the following arguments are required: command\n", "note": ""}]}, {"md": "## Step 2: Write your first spec\n\nA spec is YAML with a top-level `name`, an `output` filename (used by\n`generate`), and an ordered list of `sections`, each holding ordered\n`steps`. We will write the smallest useful spec: it creates a file, reads\nit back, and asserts on the output.", "execs": []}, {"md": "### 2.1 Create greeting.test.yaml\n\nThe `file` step writes a file during `run` (and shows it as a code block\nwhen rendered). The `run` step executes a command; its `expect_contains`\nlist asserts that each string appears in the command's output. The\n`check_file` step asserts a path exists.\n\n```yaml\nname: \"A greeting\"\noutput: greeting.md\n\nintro: |\n  The smallest useful spec: write a file, read it back, assert on it.\n\nsections:\n  - title: \"Write and verify a greeting\"\n    step: true\n    steps:\n      - title: \"Write greeting.txt\"\n        file:\n          path: greeting.txt\n          language: text\n          content: |\n            Hello from an inner spec!\n\n      - title: \"Read it back and assert\"\n        run: \"cat greeting.txt\"\n        expect_contains:\n          - \"Hello from an inner spec!\"\n\n      - title: \"Confirm the file exists\"\n        check_file: \"greeting.txt\"\n```\n\nThree step types, three jobs: `file` produces an artifact, `run`\nexercises it, `check_file` confirms it. That is the whole core loop.", "execs": [{"kind": "file", "cmd": "write greeting.test.yaml", "status": "pass", "note": "Wrote greeting.test.yaml"}]}, {"md": "## Step 3: Run the spec\n\n`doctest run` executes the spec in an isolated temporary directory, walking\nsections and steps top to bottom and checking every assertion as it goes.", "execs": []}, {"md": "### 3.1 Execute it with --verbose\n\n`--verbose` echoes each command as it runs. Watch for the `PASS` lines\nand the final results summary:\n\n```bash\ndoctest run greeting.test.yaml --verbose\n```\n\nTwo steps asserted (the `run` and the `check_file`); the `file` step\nwrites without asserting. A run where every assertion holds exits `0`;\nany failure makes `doctest run` exit non-zero, which is what lets CI\nfail when the docs drift from reality.", "execs": [{"kind": "run", "cmd": "nix run github:logos-co/logos-doctest/713a102307e47e8339c6188cbe32aa4bc7b9f2b4 -- run greeting.test.yaml --verbose", "status": "pass", "exit_code": 0, "output": "=================================================================\n Doctest: A greeting\n=================================================================\n\n  spec     : /tmp/doctest-test-5sba4nv9/greeting.test.yaml\n  workdir  : /tmp/doctest-test-08g_yu5i\n  platform : Linux (ext=so)\n  release  : (none)\n\n-----------------------------------------------------------------\n Section: Write and verify a greeting\n-----------------------------------------------------------------\n  wrote   greeting.txt\n        cmd: cat greeting.t ng.txt\n```\n\n### 1.3 Confirm the file exists\n", "note": ""}]}]}, {"meta": {"name": "Rendering, reports, and failures", "platform": "Linux (ext=so)", "release": "(none)"}, "rows": [{"md": "# Rendering, reports, and failures\n\nThe first tutorial covered the `run` / `generate` loop. This one goes deeper on\nthe *rendering* side: how to show readers a clean command while executing a\ndifferent one (`code_block`), how to capture an entire run as a shareable HTML\n**report**, and how `--continue-on-fail` changes what happens when an assertion\nfails. As before, every command here is run by the outer `doctest`, and inside\nit we author and drive a second spec.\n\n**What you'll build:** A spec with display-only command blocks, plus an HTML report of a run that contains a deliberate failure.\n\n**What you'll learn:**\n\n- How `code_block` shows a tidy command while `run` executes the real one\n- How `post_text` adds explanation after a step's action\n- How `--report` writes a self-contained two-column HTML report\n- How a failing `expect_contains` is reported, and its effect on the exit code\n- How `--continue-on-fail` walks the whole spec instead of stopping early\n- How `--tui` / `--iterative` show the same view live in the terminal\n\n## Prerequisites\n\n- **Nix** with flakes enabled (see the first tutorial). The `doctest` flake\nbundles everything else.", "execs": []}, {"md": "## Step 1: Display vs. execution with code_block (and extra_run)\n\nDuring `run`, a step's `run:` value is what executes. But the command that\nis convenient to *run* is not always the one that is clearest to *read* \u2014 a\nrun might use an absolute path, a `|| true` guard, or shell plumbing. The\n`code_block:` field overrides what `generate` shows, while `run:` stays the\nthing that executes. A step can also carry an `extra_run:` \u2014 a *second*\ncommand (with its own `run` / `code_block` / `post_text`) rendered under the\nsame heading, ideal for a \"do X, then verify X\" pair.", "execs": []}, {"md": "### 1.1 Write a spec that separates display from execution\n\nThe inner step *runs* a command with extra shell noise but *renders* a\nclean one, with `post_text` after it. Its `extra_run` adds a follow-up\ncommand under the same heading \u2014 no new `### ` title.\n\n```yaml\nname: \"Rendering details\"\noutput: render.md\n\nsections:\n  - title: \"A friendly command\"\n    step: true\n    steps:\n      - title: \"Print the date\"\n        run: \"date '+%Y' > /dev/null && echo 'the year is now'\"\n        code_block: \"date '+%Y'\"\n        expect_contains:\n          - \"the year is now\"\n        post_text: |\n          The command above is what readers see; the spec actually ran\n          a slightly different line to keep this example deterministic.\n        extra_run:\n          run: \"echo 'and the follow-up ran too'\"\n          expect_contains:\n            - \"follow-up ran too\"\n          post_text: |\n            This second command came from `extra_run`, under the same\n            step heading.\n```", "execs": [{"kind": "file", "cmd": "write render.test.yaml", "status": "pass", "note": "Wrote render.test.yaml"}]}, {"md": "### 1.2 Run it (executes both the command and its extra_run)\n\n```bash\ndoctest run render.test.yaml --verbose\n```\n\nThe summary shows **two** passes for one step: the main `run` and the\n`extra_run` (logged as `\u2026 (verify)`).", "execs": [{"kind": "run", "cmd": "nix run github:logos-co/logos-doctest/713a102307e47e8339c6188cbe32aa4bc7b9f2b4 -- run render.test.yaml --verbose", "status": "pass", "exit_code": 0, "output": "=================================================================\n Doctest: Rendering details\n=================================================================\n\n  spec     : /tmp/doctest-test-vcm4t3ke/render.test.yaml\n  workdir  : /tmp/doctest-test-fmoaxtjw\n  platform : Linux (ext=so)\n  release  : (none)\n\n-----------------------------------------------------------------\n Section: A friendly command\n-----------------------------------------------------------------\n        cmd: date '+%Y' > /dev/null && echo 'the year is now'\n  PASS  Print the date\n        cmd: echo 'and the follow-up ran too'\n  PASS  Print the date (verify)\n\n\n=================================================================\n Results: 2 passed, 0 failed, 0 skipped (of 2 run)\n=================================================================\n\n", "note": ""}]}, {"md": "### 1.3 Generate it (shows the clean commands)\n\nIn the rendered Markdown the code block is the *display* command, the\n`post_text` follows it, and the `extra_run` command appears under the\nsame heading \u2014 the executed plumbing never leaks into the docs:\n\n```bash\ndoctest generate render.test.yaml -o render.md\n```\n\nNote that `date '+%Y' > /dev/null && echo \u2026` (the executed line) does\n**not** appear \u2014 only the `code_block` does \u2014 and the `extra_run` command\nrenders inline, with no separate heading of its own.", "execs": [{"kind": "run", "cmd": "nix run github:logos-co/logos-doctest/713a102307e47e8339c6188cbe32aa4bc7b9f2b4 -- generate render.test.yaml -o render.md && cat render.md", "status": "pass", "exit_code": 0, "output": "Generated: /tmp/doctest-test-vcm4t3ke/render.md\n# Rendering details\n\n## Step 1: A friendly command\n\n### 1.1 Print the date\n\n```bash\ndate '+%Y'\n```\n\nThe command above is what readers see; the spec actually ran\na slightly different line to keep this example deterministic.\n\n```bash\necho 'and the follow-up ran too'\n```\n\nThis second command came from `extra_run`, under the same\nstep heading.\n", "note": ""}]}, {"md": "## Step 2: Capture a run as an HTML report\n\n`--report PATH` writes a self-contained HTML file with two columns per step:\nthe rendered documentation on the left, and the commands actually executed\nplus their output (with pass/fail badges) on the right. It is the artifact\nCI publishes so reviewers can see exactly what ran.", "execs": n\n```yaml\nname: \"Deliberately broken\"\noutput: broken.md\n\nsections:\n  - title: \"Mismatched expectation\"\n    step: true\n    steps:\n      - title: \"Echo one thing, expect another\"\n        run: \"echo hello\"\n        expect_contains:\n          - \"this string is not in the output\"\n      - title: \"A second step (only reached with --continue-on-fail)\"\n        run: \"echo second-step-ran\"\n        expect_contains:\n          - \"second-step-ran\"\n```", "execs": [{"kind": "file", "cmd": "write broken.test.yaml", "status": "pass", "note": "Wrote broken.test.yaml"}]}, {"md": "### 3.2 Run it \u2014 the failure is reported and the exit code is non-zero\n\nWe add `|| true` so this doc-test can continue past the inner failure and\nassert on the `FAIL` line. The inner `doctest` still exits non-zero \u2014 that\nnon-zero exit is exactly what fails a CI job:\n\n```bash\ndoctest run broken.test.yaml --continue-on-fail\n```\n\nWith `--continue-on-fail`, the runner walked **both** inner steps: the\nfirst failed and the second still ran and passed \u2014 the summary\n`1 passed, 1 failed` proves it reached the second step. Without that\nflag, `doctest run` stops at the first failure (fail-fast), the right\ndefault for local iteration; `--continue-on-fail` is what you want in CI\nso the report captures the whole run.", "execs": [{"kind": "run", "cmd": "nix run github:logos-co/logos-doctest/713a102307e47e8339c6188cbe32aa4bc7b9f2b4 -- run broken.test.yaml --continue-on-fail || true", "status": "pass", "exit_code": 0, "output": "=================================================================\n Doctest: Deliberately broken\n=================================================================\n\n  spec     : /tmp/doctest-test-vcm4t3ke/broken.test.yaml\n  workdir  : /tmp/doctest-test-volosrll\n  platform : Linux (ext=so)\n  release  : (none)\n\n-----------------------------------------------------------------\n Section: Mismatched expectation\n-----------------------------------------------------------------\n  FAIL  Echo one thing, expect another\n        expected 'this string is not in the output' not found in output\n        actual:   hello\n  PASS  A second step (only reached with --continue-on-fail)\n\n\n=================================================================\n Results: 1 passed, 1 failed, 0 skipped (of 2 run)\n=================================================================\n\nFailures:\n  FAIL  Echo one thing, expect another\n        expected 'this string is not in the output' not found in output\n        actual:   hello\n\n", "note": ""}]}, {"md": "## Watching a run live (--tui / --iterative)\n\nThe `--report` HTML is written *after* a run finishes. When you want the same\ntwo-column view **live in the terminal as it runs**, use `--tui`:\n\n```bash\ndoctest run examples/hello.test.yaml --tui\n```\n\nThe left pane renders the current step's documentation, the right pane shows\nthe command executing and its output, updating as the run proceeds. Add\n`--iterative` to advance one step at a time, waiting for a keypress (the\ndown/right arrow, or space) before each step; press `q` to quit:\n\n```bash\ndoctest run examples/hello.test.yaml --tui --iterative\n```\n\nTwo things to know:\n\n- `--tui` needs an **interactive terminal** (a TTY) and the\n  [`rich`](https://github.com/Textualize/rich) package. Both are bundled in\n  the doctest flake, so `nix run \u2026 -- run \u2026 --tui` works out of the box; run\n  with a piped/redirected stdout (as CI does) and doctest tells you a TTY is\n  required instead of drawing the UI.\n- `--iterative` only applies together with `--tui` \u2014 using it alone is an\n  error.\n\nBecause the TUI requires a real terminal, this section is **documentation\nonly**: unlike every other step in these tutorials, the commands above are\nnot executed by the doc-test runner (which runs head-less in CI). Everything\n`--tui` shows is the exact same rendered docs and executed commands you get\nfrom `generate` and `--report` \u2014 only the presentation is live.", "execs": []}]}, {"meta": {"name": "Chaining specs and cleaning the output tree", "platform": "Linux (ext=so)", "release": "(none)"}, "rows": [{"md": "# Chaining specs and cleaning the output tree\n\nReal tutorials often come in parts: Part 2 builds on what Part 1 produced. This\ntutorial shows how `requires:` chains specs so a prerequisite runs first in its\nown directory, how `--output-dir` lays the chain out on disk, and how `doctest\nclean` strips an executed tree back to checked-in source. As always, we drive\ninner specs from inside this one.\n\n**What you'll build:** A two-spec chain (a base spec and one that consumes its output), run into a directory you can inspect, then cleaned.\n\n**What you'll learn:**\n\n- How `requires:` declares prerequisite specs, run before the spec that needs them\n- Why chained specs need a `project_name`, and how it names their subdirectory\n- How a later spec references an earlier one's output (`../<project_name>/\u2026`)\n- How `--output-dir` keeps the result on disk instead of a temp dir\n- How `--workdir` / `--keep-workdir` run a single spec into an existing directory\n- How `doctest clean` removes build artifacts, with `--dry-run` and `--keep`\n\n## Prerequisites\n\n- **Nix** with flakes enabled (see the first tutorial).", "execs": []}, {"md": "## Step 1: A base spec to build on\n\nChaining is keyed on `project_name`: each spec in a chain runs in a sibling\ndirectory named by its `project_name`. We start with a base spec that simply\nproduces a marker file other specs can consume.", "execs": []}, {"md": "### 1.1 Write base.test.yaml\n\nNote the `project_name: base-project` \u2014 without it, a spec that\nparticipates in a chain is an error.\n\n```yaml\nname: \"Base project\"\noutput: base.md\nproject_name: base-project\n\nsections:\n  - title: \"Produce an artifact\"\n    step: true\n    steps:\n      - title: \"Write a marker file\"\n        file:\n          path: artifact.txt\n          language: text\n          content: |\n            built-by-base-project\n```", "execs": [{"kind": "file", "cmd": "write base.test.yaml", "status": "pass", "note": "Wrote base.test.yaml"}]}, {"md": "## Step 2: A spec that requires the base\n\nThe second spec declares `requires: [base.test.yaml]`. When you run it,\n`doctest` runs the base first (in `base-project/`), then this spec (in\n`consumer-project/`), so it can read the base's output through the sibling\npath `../base-project/`.", "execs": []}, {"md": "### 2.1 Write consumer.test.yaml\n\n```yaml\nname: \"Consumer project\"\noutput: consumer.md\nproject_name: consumer-project\n\nrequires:\n  - base.test.yaml\n\nsections:\n  - title: \"Use the base's artifact\"\n    step: true\n    steps:\n      - title: \"Read the sibling project's output\"\n        run: \"cat ../base-project/artifact.txt\"\n        expect_contains:\n          - \"built-by-base-project\"\n```\n\n`requires:` is resolved **transitively** and de-duplicated: if A requires\nB and B requires C, running A runs C, then B, then A, each once.", "execs": [{"kind": "file", "cmd": "write consumer.test.yaml", "status": "pass", "note": "Wrote consumer.test.yaml"}]}, {"md": "## Step 3: Run the chain into a directory you keep\n\nBy default a run uses a temp directory that is deleted afterwards. With\n`--output-dir DIR`, the directory is created (if missing) and **kept**, and\nfor a chain it becomes the chain root with one subdirectory per project.", "execs": []}, {"md": "### 3.1 Run the consumer (the base runs first)\n\n```bash\ndoctest run consumer.test.yaml --output-dir ./chain-out\n```\n\nBoth specs ran: the base produced its artifact (a `file` step, which\nwrites without asserting), then the consumer read it back across the\nproject boundary and asserted on it \u2014 the one `PASS` in the summary.", "execs": [{"kind": "run", "cmd": "nix run github:logos-co/logos-doctest/713a102307e47e8339c6188cbe32aa4bc7b9f2b4 -- run consumer.test.yaml --output-dir ./chain-out", "status": "pass", "exit_code": 0, "output": "=================================================================\n Doctest: Base project\n=================================================================\n\n  spec     : /tmp/doctest-test-w686xl7a/base.test.yaml\n  workdir  : /tmp/doctest-test-w686xl7a/chain-out/base-project\n  platform : Linux (ext=so)\n  release  : (none)\n\n-----------------------------------------------------------------\n Section: Produce an artifact\n-----------------------------------------------------------------\n  wrote   artifact.txt\n\n=================================================================\n Doctest: Consumer project\n=================================================================\n\n  spec     : /tmp/doctest-test-w686xl7a/consumer.test.yaml\n  workdir  : /tmp/doctest-test-w686xl7a/chain-out/consumer-project\n  platform : Linux (ext=so)\n  release  : (none)\n\n-----------------------------------------------------------------\n Section: Use the base's artifact\n-----------------------------------------------------------------\n  PASS  Read the sibling project's output\n\n  output : /tmp/doctest-test-w686xl7a/chain-out\n\n=================================================================\n Results: 1 passed, 0 failed, 0 skipped (of 1 run)\n=================================================================\n\n", "note": ""}]}, {"md": "### 3.2 Inspect the on-disk layout\n\nThe chain root holds one directory per `project_name`, each with that\nproject's files:\n\n```bash\nfind ./chain-out -maxdepth 2 -type f\n```", "execs": [{"kind": "run", "cmd": "find ./chain-out -maxdepth 2 -type f | sort", "status": "pass", "exit_code": 0, "output": "./chain-out/base-project/artifact.txt\n", "note": ""}]}, {"md": "## Step 4: Running into an existing directory (--workdir)\n\n`--output-dir` is the chain-aware option: it *creates* the directory, keeps\nit, and lays out one subdirectory per project. `--workdir` is the simpler\nsibling for a **single** spec: it runs into a directory that **must already\nexist**, ignores any `requires:` chain, and \u2014 unlike `--output-dir` \u2014 deletes\nthat directory on exit *unless* you add `--keep-workdir`.", "execs": []}, {"md": "### 4.1 Write a standalone spec\n\nA one-step spec with no `requires:` \u2014 just produces a file:\n\n```yaml\nname: \"Solo spec\"\noutput: solo.md\nsections:\n  - title: \"Produce a file\"\n    step: true\n    steps:\n      - title: \"Write output.txt\"\n        file:\n          path: output.txt\n          language: text\n          content: |\n            produced-in-workdir\n      - title: \"Verify it\"\n        run: \"cat output.txt\"\n        expect_contains:\n          - \"produced-in-workdir\"\n```", "execs": [{"kind": "file", "cmd": "write solo.test.yaml", "status": "pass", "note": "Wrote solo.test.yaml"}]}, {"md": "### 4.2 Run into a pre-created directory, keeping it\n\n`--workdir` does not create the directory, so we `mkdir` it first.\n`--keep-workdir` stops doctest from deleting it on exit, so we can\ninspect the result:\n\n```bash\nmkdir -p ./my-workdir\ndoctest run solo.test.yaml --workdir ./my-workdir --keep-workdir\n```", "execs": [{"kind": "run", "cmd": "mkdir -p ./my-workdir\nnix run github:logos-co/logos-doctest/713a102307e47e8339c6188cbe32aa4bc7b9f2b4 -- run solo.test.yaml --workdir ./my-workdir --keep-workdir\n", "status": "pass", "exit_code": 0, "output": "=================================================================\n Doctest: Solo spec\n=================================================================\n\n  spec     : /tmp/doctest-test-w686xl7a/solo.test.yaml\n  workdir  : /tmp/doctest-test-w686xl7a/my-workdir\n  platform : Linux (ext=so)\n  release  : (none)\n\n-----------------------------------------------------------------\n Section: Produce a file\n-----------------------------------------------------------------\n  wrote   output.txt\n  PASS  Verify it\n\n  workdir: /tmp/doctest-test-w686xl7a/my-workdir\n\n=================================================================\n Results: 1 passed, 0 failed, 0 skipped (of 1 run)\n=================================================================\n\n", "note": ""}]}, {"md": "### 4.3 Confirm the directory was kept with its output\n\nBecause of `--keep-workdir`, the directory and the file the spec produced\nare still there:\n\n```bash\ncat ./my-workdir/output.txt\n```\n\nWithout `--keep-workdir`, doctest would have deleted `./my-workdir` (and\neverything in it) when the run finished \u2014 handy for a throwaway check\nagainst a directory you already have, but use `--output-dir` (or add\n`--keep-workdir`) whenever you want to keep the result.", "execs": [{"kind": "run", "cmd": "cat ./my-workdir/output.txt", "status": "pass", "exit_code": 0, "output": "produced-in-workdir\n", "note": ""}]}, {"md": "## Step 5: Clean the executed tree\n\nAn executed `--output-dir` tree mixes generated source with build artifacts\n(out-links, compiled libraries, `modules/`, logs). `doctest clean` removes\nthe artifacts so what remains is committable source. Preview first with\n`--dry-run`, and spare specific patterns with `--keep`.", "execs": []}, {"md": "### 5.1 Add some artifacts to clean\n\nSimulate what a real build leaves behind:\n\n```bash\ntouch result libdemo.so build.log   # leftover build artifacts\n```", "execs": [{"kind": "run", "cmd": "touch ./chain-out/consumer-project/result ./chain-out/consumer-project/libdemo.so ./chain-out/base-project/build.log", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 5.2 Preview removals with --dry-run\n\n`--dry-run` lists what *would* be removed without touching anything:\n\n```bash\ndoctest clean ./chain-out --dry-run\n```", "execs": [{"kind": "run", "cmd": "nix run github:logos-co/logos-doctest/713a102307e47e8339c6188cbe32aa4bc7b9f2b4 -- clean ./chain-out --dry-run", "status": "pass", "exit_code": 0, "output": "  would remove  base-project/build.log\n  would remove  consumer-project/libdemo.so\n  would remove  consumer-project/result\nclean: would remove 3 artifact(s) under /tmp/doctest-test-w686xl7a/chain-out\n", "note": ""}]}, {"md": "### 5.3 Clean for real, keeping logs\n\nNow remove the artifacts but keep `*.log` files with `--keep`. The\nout-link and the compiled library go; the log stays:\n\n```bash\ndoctest clean ./chain-out --keep '*.log' --verbose\n```", "execs": [{"kind": "run", "cmd": "nix run github:logos-co/logos-doctest/713a102307e47e8339c6188cbe32aa4bc7b9f2b4 -- clean ./chain-out --keep '*.log' --verbose", "status": "pass", "exit_code": 0, "output": "  removed  consumer-project/libdemo.so\n  removed  consumer-project/result\nclean: removed 2 artifact(s) under /tmp/doctest-test-w686xl7a/chain-out\n", "note": ""}]}, {"md": "### 5.4 Confirm what survived\n\nThe generated source and the kept log remain; the build artifacts are\ngone \u2014 a tree you could check in as-is:\n\n```bash\nfind ./chain-out -type f\n```\n\n`result` and `libdemo.so` are no longer listed: `clean` removed them,\n`--keep '*.log'` preserved `build.log`, and the real source survived.", "execs": [{"kind": "run", "cmd": "find ./chain-out -type f | sort", "status": "pass", "exit_code": 0, "output": "./chain-out/base-project/artifact.txt\n./chain-out/base-project/build.log\n", "note": ""}]}]}, {"meta": {"name": "Combined reports and release pinning", "platform": "Linux (ext=so)", "release": "(none)"}, "rows": [{"md": "# Combined reports and release pinning\n\nThe final tutorial covers the two features you reach for when wiring `doctest`\ninto a real project's CI: running **several specs into one report** (so a repo\nwith many `*.test.yaml` files publishes a single artifact with a dropdown), and\nthe **`{release}` placeholder** that lets one spec target either bleeding-edge\nor a pinned release of the repos it builds. We demonstrate both from inside this\nspec.\n\n**What you'll build:** Two inner specs rendered into a single combined HTML report, plus a spec that pins a GitHub URL via {release}.\n\n**What you'll learn:**\n\n- How `doctest run a.yaml b.yaml --report r.html` combines specs into one report\n- Why the combined report has a per-spec dropdown (one entry per spec)\n- How the `{release}` placeholder expands in `run` commands and rendered docs\n- How `--release TAG` overrides the spec's `release:` field at the CLI\n- How `--release-for REPO=REF` pins a single repo to a tag or commit\n- The recommended `tests/` + `outputs/` project layout for keeping docs honest\n\n## Prerequisites\n\n- **Nix** with flakes enabled (see the first tutorial).", "execs": []}, {"md": "## Step 1: Two specs, one report\n\nA repo usually has more than one spec. Passing them all to a single `doctest\nrun` executes them back-to-back into one `--report`, whose top-right dropdown\nswitches between them \u2014 far tidier than one HTML file per spec.", "execs": []}, {"md": "### 1.1 Write two small specs\n\nTwo independent specs, each a single passing assertion:\n\n```yaml\nname: \"Alpha\"\noutput: alpha.md\nsections:\n  - title: \"Alpha check\"\n    step: true\n    steps:\n      - title: \"Echo alpha\"\n        run: \"echo alpha-ok\"\n        expect_contains:\n          - \"alpha-ok\"\n```", "execs": [{"kind": "file", "cmd": "write alpha.test.yaml", "status": "pass", "note": "Wrote alpha.test.yaml"}]}, {"md": "### 1.2 Write the second spec\n\n```yaml\nname: \"Beta\"\noutput: beta.md\nsections:\n  - title: \"Beta check\"\n    step: true\n    steps:\n      - title: \"Echo beta\"\n        run: \"echo beta-ok\"\n        expect_contains:\n          - \"beta-ok\"\n```", "execs": [{"kind": "file", "cmd": "write beta.test.yaml", "status": "pass", "note": "Wrote beta.test.yaml"}]}, {"md": "### 1.3 Run both into a single report\n\nPass both specs to one `run`. They execute in order and share one report\nfile. `--continue-on-fail` is the CI-friendly choice so the report is\ncomplete even if a spec fails:\n\n```bash\ndoctest run alpha.test.yaml beta.test.yaml --continue-on-fail --report combined.html\n```", "execs": [{"kind": "run", "cmd": "nix run github:logos-co/logos-doctest/713a102307e47e8339c6188cbe32aa4bc7b9f2b4 -- run alpha.test.yaml beta.test.yaml --continue-on-fail --report combined.html", "status": "pass", "exit_code": 0, "output": "=================================================================\n Doctest: Alpha\n=================================================================\n\n  spec     : /tmp/doctest-test-talr_8w4/alpha.test.yaml\n  workdir  : /tmp/doctest-test-5mxnuw64\n  platform : Linux (ext=so)\n  release  : (none)\n\n-----------------------------------------------------------------\n Section: Alpha check\n-----------------------------------------------------------------\n  PASS  Echo alpha\n\n=================================================================\n Doctest: Beta\n=================================================================\n\n  spec     : /tmp/doctest-test-talr_8w4/beta.test.yaml\n  workdir  : /tmp/doctest-test-elgs22wr\n  platform : Linux (ext=so)\n  release  : (none)\n\n-----------------------------------------------------------------\n Section: Beta check\n-----------------------------------------------------------------\n  PASS  Echo beta\n\n\n=================================================================\n Results: 2 passed, 0 failed, 0 skipped (of 2 run)\n=================================================================\n\n  report : /tmp/doctest-test-talr_8w4/combined.html\n", "note": ""}]}, {"md": "### 1.4 Confirm the combined report exists", "execs": [{"kind": "check_file", "cmd": "check file: combined.html", "status": "pass", "note": "Found: /tmp/doctest-test-talr_8w4/combined.html"}]}, {"md": "### 1.5 Both specs are in the dropdown\n\nThe report's spec picker is populated from the embedded run data \u2014 one\nentry per spec. Both names are present in the single file:\n\n```bash\ngrep -o 'Alpha\\|Beta' combined.html | sort -u\n```\n\nOne report, two dropdown entries. (`--output-dir` and `--tui`, by\ncontrast, operate on a single spec \u2014 pass just one to those.)", "execs": [{"kind": "run", "cmd": "grep -o 'Alpha\\|Beta' combined.html | sort -u", "status": "pass", "exit_code": 0, "output": "Alpha\nBeta\n", "note": ""}]}, {"md": "## Step 2: Pinning versions with the {release} placeholder\n\nSpecs that build GitHub repos often want to target a specific release rather\nthan the latest commit. Anywhere a `run` command, `code_block`, or file body\ncontains the release placeholder, `doctest` expands it \u2014 to `/TAG` when a\nrelease is set, or to nothing when it is empty \u2014 so one spec can render either\nbleeding-edge or pinned instructions without editing URLs by hand.\n\nA spec author writes a flake reference such as\n`github:logos-co/logos-module-builder` followed by the placeholder and\n`#with-external-lib`. With no release it stays bare; with `--release demo-v1`\nit becomes `github:logos-co/logos-module-builder/demo-v1#with-external-lib`.\nBelow we prove both, from inside this spec.", "execs": []}, {"md": "### 2.1 Write an inner spec that uses the placeholder\n\nWe generate the inner spec with a heredoc rather than a `file` step. Why?\nThis outer step is *itself* placeholder-expanded, so a literal token typed\nhere would be substituted by the **outer** run before the inner spec ever\nsaw it. Assembling the braces from a shell variable (`LB='{'`) sidesteps\nthat: the written file ends up with a real placeholder for the **inner**\nrun to expand.\n\n```bash\n# Write pinned.test.yaml. LB/RB assemble the brace token so the OUTER\n# run leaves it intact; the written file gets a real placeholder for the\n# inner run to expand. We reference two repos so the per-repo pin below\n# has something to distinguish.\nLB='{'; RB='}'\ncat > pinned.test.yaml <<EOF\n# ...\nrun: \"echo 'github:logos-co/logos-module-builder${LB}release${RB}#with-external-lib\n             github:logos-co/logos-liblogos${LB}release${RB}'\"\n# ...\nEOF\n```\n\nThe written `pinned.test.yaml` now holds a real release placeholder in its\n`run:` command for **two** repos \u2014 put there without the outer run\nsubstituting them.", "execs": [{"kind": "run", "cmd": "LB='{'; RB='}'\ncat > pinned.test.yaml <<EOF\nname: \"Release placeholder demo\"\noutput: pinned.md\nsections:\n  - title: \"Show the resolved URLs\"\n    step: true\n    steps:\n      - title: \"Print two flake references\"\n        run: \"echo 'github:logos-co/logos-module-builder${LB}release${RB}#with-external-lib github:logos-co/logos-liblogos${LB}release${RB}'\"\n        expect_contains:\n          - \"logos-module-builder\"\nEOF\n", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 2.2 Confirm the inner spec was written", "execs": [{"kind": "check_file", "cmd": "check file: pinned.test.yaml", "status": "pass", "note": "Found: /tmp/doctest-test-talr_8w4/pinned.test.yaml"}]}, {"md": "### 2.3 Run the inner spec with no release\n\nWith no release set, the placeholder expands to an empty string and the\nURL points at the default branch:\n\n```bash\ndoctest run pinned.test.yaml --verbose\n```", "execs": [{"kind": "run", "cmd": "nix run github:logos-co/logos-doctest/713a102307e47e8339c6188cbe32aa4bc7b9f2b4 -- run pinned.test.yaml --verbose", "status": "pass", "exit_code": 0, "output": "=================================================================\n Doctest: Release placeholder demo\n=================================================================\n\n  spec     : /tmp/doctest-test-talr_8w4/pinned.test.yaml\n  workdir  : /tmp/doctest-test-g37aseka\n  platform : Linux (ext=so)\n  release  : (none)\n\n-----------------------------------------------------------------\n Section: Show the resolved URLs\n-----------------------------------------------------------------\n        cmd: echo 'github:logos-co/logos-module-builder#with-external-lib github:logos-co/logos-liblogos'\n  PASS  Print two flake references\n\n\n=================================================================\n Results: 1 passed, 0 failed, 0 skipped (of 1 run)\n=================================================================\n\n", "note": ""}]}, {"md": "### 2.4 Run the inner spec with --release\n\n`--release TAG` overrides the spec's `release:` field for the whole run,\nso **every** placeholder now expands to `/TAG` \u2014 both repos move together:\n\n```bash\ndoctest run pinned.test.yaml --release demo-v1 --verbose\n```\n\nBoth URLs picked up `/demo-v1` from the single `--release` flag.", "execs": [{"kind": "run", "cmd": "nix run github:logos-co/logos-doctest/713a102307e47e8339c6188cbe32aa4bc7b9f2b4 -- run pinned.test.yaml --release demo-v1 --verbose", "status": "pass", "exit_code": 0, "output": "=================================================================\n Doctest: Release placeholder demo\n=================================================================\n\n  spec     : /tmp/doctest-test-talr_8w4/pinned.test.yaml\n  workdir  : /tmp/doctest-test-guv3fd1h\n  platform : Linux (ext=so)\n  release  : demo-v1\n\n-----------------------------------------------------------------\n Section: Show the resolved URLs\n-----------------------------------------------------------------\n        cmd: echo 'github:logos-co/logos-module-builder/demo-v1#with-external-lib github:logos-co/logos-liblogos/demo-v1'\n  PASS  Print two flake references\n\n\n=================================================================\n Results: 1 passed, 0 failed, 0 skipped (of 1 run)\n=================================================================\n\n", "note": ""}]}, {"md": "### 2.5 Pin one repo to a commit with --release-for\n\nOften you want most repos at a release but **one** at a specific commit \u2014\nfor example, a repo's own CI building the exact commit under test while\neverything else stays on the published release. `--release-for REPO=REF`\ndoes that: `REF` is a git tag **or a commit hash**, it is repeatable, and\nit overrides `--release` for that one repo only. Here `logos-module-builder`\nis pinned to a commit while `logos-liblogos` keeps the global `demo-v1`:\n\n```bash\ndoctest run pinned.test.yaml --release demo-v1 --release-for logos-module-builder=abc123def --verbose\n```\n\nOne spec, per-repo control: `logos-module-builder` resolved to the commit\n`abc123def`, while `logos-liblogos` stayed on `demo-v1`. This is exactly\nhow a repo's CI tests *its* commit against the rest of the released stack\n(`--release-for <that-repo>=$GITHUB_SHA`); an empty ref \u2014\n`--release-for REPO=` \u2014 forces a single repo back to latest even when a\nglobal `--release` is set.", "execs": [{"kind": "run", "cmd": "nix run github:logos-co/logos-doctest/713a102307e47e8339c6188cbe32aa4bc7b9f2b4 -- run pinned.test.yaml --release demo-v1 --release-for logos-module-builder=abc123def --verbose", "status": "pass", "exit_code": 0, "output": "=================================================================\n Doctest: Release placeholder demo\n=================================================================\n\n  spec     : /tmp/doctest-test-talr_8w4/pinned.test.yaml\n  workdir  : /tmp/doctest-test-oqophm7p\n  platform : Linux (ext=so)\n  release  : demo-v1\n  pins     : logos-module-builder=abc123def\n\n-----------------------------------------------------------------\n Section: Show the resolved URLs\n-----------------------------------------------------------------\n        cmd: echo 'github:logos-co/logos-module-builder/abc123def#with-external-lib github:logos-co/logos-liblogos/demo-v1'\n  PASS  Print two flake references\n\n\n=================================================================\n Results: 1 passed, 0 failed, 0 skipped (of 1 run)\n=================================================================\n\n", "note": ""}]}, {"md": "## Putting it together in a project\n\nThe pattern these four tutorials demonstrate is exactly how a real repo wires\n`doctest` into CI:\n\n- Keep specs in a `doctests/` (or `tests/`) directory, one `*.test.yaml` per\n  topic, each both runnable and renderable.\n- In CI, run them all into one report:\n  `doctest run doctests/*.test.yaml --continue-on-fail --report report.html`,\n  publish the HTML, and let the non-zero exit fail the job when the docs\n  drift from the code.\n- Render the committed Markdown with `doctest generate`, and strip executed\n  output trees with `doctest clean` before checking them in.\n\nThis very directory is that pattern applied to `doctest` itself: the specs\nhere are run by `doctest` in CI, and the tool's own documentation is verified\nby the tool. Inception complete.", "execs": []}]}, {"meta": {"name": "The rest of the spec format: binary files, comparison, and Logos hooks", "platform": "Linux (ext=so)", "release": "(none)"}, "rows": [{"md": "# The rest of the spec format: binary files, comparison, and Logos hooks\n\nThe first four tutorials cover the features you reach for daily. This one is a\nguided tour of the **remaining** spec fields: binary `file` content via\n`encoding: base64`, the top-level `comparison` block (this very tutorial uses\none \u2014 see just below its learning objectives), the `release_overrides` spec\nfield, and the opt-in Logos integrations. Of those, `build_overrides` *is*\nexercised for real (its flag-injection needs no toolchain); `ui_test` needs a\nrunning Qt app, so it appears as a clearly-labelled reference snippet rather\nthan an executed example.\n\n**What you'll build:** A spec that round-trips a binary file and one that proves build_overrides injects a Nix flag, plus a reference for ui_test.\n\n**What you'll learn:**\n\n- {'How `encoding': 'base64` writes binary files and renders them as a note'}\n- What the top-level `comparison` field is for (you are reading one)\n- How the `release_overrides` spec field mirrors `--release-for`\n- How `build_overrides` injects `--override-input` into `nix build` commands\n- What a `ui_test` step looks like for headless Qt UI checks (reference only)\n\n**Why a `comparison` block?** It is a free-form Markdown region rendered right\nafter *What you'll learn*, before the first section \u2014 handy for a table or a\nparagraph that frames the tutorial (for instance, contrasting two approaches).\nThis paragraph is itself the `comparison:` field of this spec.\n\n## Prerequisites\n\n- **Nix** with flakes enabled (see the first tutorial). The binary-file section\nruns anywhere; the Logos sections are reference-only.", "execs": []}, {"md": "## Step 1: Binary files with encoding: base64\n\nA `file` step usually carries plain-text `content`. For binary artifacts\n(images, compiled blobs, fixtures) set `encoding: base64` and put the\nbase64 of the bytes in `content`. On `run`, doctest decodes it to disk; on\n`generate`, instead of dumping bytes it renders a `*Binary file: \\`path\\`*`\nnote.", "execs": []}, {"md": "### 1.1 Write a spec that emits a binary file\n\nThe base64 below decodes to the ASCII bytes `doctest-binary-ok`. The\ninner spec writes them, then reads them back to prove the round-trip:\n\n```yaml\nname: \"Binary file demo\"\noutput: binary.md\nsections:\n  - title: \"Round-trip a binary blob\"\n    step: true\n    steps:\n      - title: \"Write blob.bin from base64\"\n        file:\n          path: blob.bin\n          encoding: base64\n          content: |\n            ZG9jdGVzdC1iaW5hcnktb2s=\n      - title: \"Read the decoded bytes back\"\n        run: \"cat blob.bin\"\n        expect_contains:\n          - \"doctest-binary-ok\"\n```", "execs": [{"kind": "file", "cmd": "write binary.test.yaml", "status": "pass", "note": "Wrote binary.test.yaml"}]}, {"md": "### 1.2 Run it \u2014 the bytes round-trip\n\nThe inner spec decodes `blob.bin` and reads it back; its `expect_contains`\nasserts the decoded text, so a passing summary means the round-trip held:\n\n```bash\ndoctest run binary.test.yaml --verbose\n```", "execs": [{"kind": "run", "cmd": "nix run github:logos-co/logos-doctest/713a102307e47e8339c6188cbe32aa4bc7b9f2b4 -- run binary.test.yaml --verbose", "status": "pass", "exit_code": 0, "output": "=================================================================\n Doctest: Binary file demo\n=================================================================\n\n  spec     : /tmp/doctest-test-kvbnnkd9/binary.test.yaml\n  workdir  : /tmp/doctest-test-rsysnax3\n  platform : Linux (ext=so)\n  release  : (none)\n\n-----------------------------------------------------------------\n Section: Round-trip a binary blob\n-----------------------------------------------------------------\n  wrote   blob.bin\n        cmd: cat blob.bin\n  PASS  Read the decoded bytes back\n\n\n=================================================================\n Results: 1 passed, 0 failed, 0 skipped (of 1 run)\n=================================================================\n\n", "note": ""}]}, {"md": "### 1.3 Generate it \u2014 the binary renders as a note\n\n`generate` never dumps raw bytes into the Markdown; it emits a short\nnote pointing at the file instead:\n\n```bash\ndoctest generate binary.test.yaml -o binary.md\n```\n\nSo a spec stays readable even when it ships fixtures \u2014 the bytes live in\n`content`, the docs show a tidy reference.", "execs": [{"kind": "run", "cmd": "nix run github:logos-co/logos-doctest/713a102307e47e8339c6188cbe32aa4bc7b9f2b4 -- generate binary.test.yaml -o binary.md && cat binary.md", "status": "pass", "exit_code": 0, "output": "Generated: /tmp/doctest-test-kvbnnkd9/binary.md\n# Binary file demo\n\n## Step 1: Round-trip a binary blob\n\n### 1.1 Write blob.bin from base64\n\n*Binary file: `blob.bin`*\n\n### 1.2 Read the decoded bytes back\n\n```bash\ncat blob.bin\n```\n", "note": ""}]}, {"md": "## Step 2: Per-repo release pins in the spec (release_overrides)\n\nTutorial 4 pinned a single repo from the CLI with `--release-for\nREPO=REF`. The same thing can live **in the spec** under a top-level\n`release_overrides:` map, so a spec carries its own per-repo defaults; a CLI\n`--release-for` still wins on conflicts. We confirm doctest accepts the\nfield by generating a spec that declares it.", "execs": []}, {"md": "### 2.1 Write a spec carrying release_overrides\n\n```yaml\nname: \"Override demo\"\noutput: overrides.md\nrelease: \"demo-v1\"\nrelease_overrides:\n  logos-module-builder: \"abc123def\"\nsections:\n  - title: \"Just framing\"\n    step: true\n    steps:\n      - title: \"A note\"\n        text: \"This spec pins logos-module-builder to a commit by default.\"\n```", "execs": [{"kind": "file", "cmd": "write overrides.test.yaml", "status": "pass", "note": "Wrote overrides.test.yaml"}]}, {"md": "### 2.2 Generate it (the field is accepted and the doc renders)\n\n```bash\ndoctest generate overrides.test.yaml -o overrides.md\n```\n\nAt run time, any `github:logos-co/logos-module-builder` URL in\nthat spec would resolve to `/abc123def`, while every other repo would use\nthe spec's global `release: demo-v1` \u2014 exactly like passing\n`--release-for logos-module-builder=abc123def --release demo-v1` on the\ncommand line.", "execs": [{"kind": "run", "cmd": "nix run github:logos-co/logos-doctest/713a102307e47e8339c6188cbe32aa4bc7b9f2b4 -- generate overrides.test.yaml -o overrides.md && cat overrides.md", "status": "pass", "exit_code": 0, "output": "Generated: /tmp/doctest-test-kvbnnkd9/overrides.md\n# Override demo\n\n## Step 1: Just framing\n\n### 1.1 A note\n\nThis spec pins logos-module-builder to a commit by default.\n", "note": ""}]}, {"md": "## Step 3: build_overrides: inject Nix --override-input flags\n\n`build_overrides` is a top-level map that injects `--override-input` flags\ninto every command containing `nix build`, so a tutorial can build against a\nlocal checkout instead of the pinned flake input. Keys are input names,\nvalues are paths relative to the spec. It only affects **execution**;\n`generate` ignores it, so the published docs keep the clean commands.\n\nUnlike `ui_test` below, this *is* executable without the Logos toolchain \u2014\nthe injection is pure string rewriting \u2014 so we prove it for real. We point\nan override at a local directory and assert that the flag is spliced into a\n`nix build` command.", "execs": []}, {"md": "### 3.1 Create the directory the override points at\n\nThe override path must exist on disk, or the runner emits a warning and\nskips it. A bare directory is enough for this demonstration:\n\n```bash\nmkdir -p ./fake-sdk\n```", "execs": [{"kind": "run", "cmd": "mkdir -p ./fake-sdk && echo created", "status": "pass", "exit_code": 0, "output": "created\n", "note": ""}]}, {"md": "### 3.2 Write a spec that declares build_overrides\n\n```yaml\nname: \"build_overrides demo\"\noutput: ob.md\nbuild_overrides:\n  logos-cpp-sdk: ./fake-sdk\nsections:\n  - title: \"A build command\"\n    step: true\n    steps:\n      - title: \"Run a nix build (echoed, not really built)\"\n        run: \"echo 'nix build .#demo'\"\n        expect_contains:\n          - \"--override-input logos-cpp-sdk\"\n```", "execs": [{"kind": "file", "cmd": "write overrides-build.test.yaml", "status": "pass", "note": "Wrote overrides-build.test.yaml"}]}, {"md": "### 3.3 Run it \u2014 the override flag is injected\n\nThe inner spec's command is `echo 'nix build .#demo'`. Because it\ncontains `nix build`, the runner appends the override flag before\nexecuting \u2014 and the inner `expect_contains` asserts the flag is present,\nso a passing summary proves the injection happened:\n\n```bash\ndoctest run overrides-build.test.yaml --verbose\n```\n\nThe executed command became\n`echo 'nix build .#demo' --override-input logos-cpp-sdk path:\u2026/fake-sdk`.\nIn a real tutorial the value would be a sibling checkout\n(e.g. `../logos-cpp-sdk`) so `nix build` resolves against your local\ncode; `generate` would still render the plain `nix build .#demo`.", "execs": [{"kind": "run", "cmd": "nix run github:logos-co/logos-doctest/713a102307e47e8339c6188cbe32aa4bc7b9f2b4 -- run overrides-build.test.yaml --verbose", "status": "pass", "exit_code": 0, "output": "=================================================================\n Doctest: build_overrides demo\n=================================================================\n\n  spec     : /tmp/doctest-test-kvbnnkd9/overrides-build.test.yaml\n  workdir  : /tmp/doctest-test-es3w9p0o\n  platform : Linux (ext=so)\n  release  : (none)\n  overrides: --override-input logos-cpp-sdk path:/tmp/doctest-test-kvbnnkd9/fake-sdk\n\n-----------------------------------------------------------------\n Section: A build command\n-----------------------------------------------------------------\n        cmd: echo 'nix build .#demo' --override-input logos-cpp-sdk path:/tmp/doctest-test-kvbnnkd9/fake-sdk\n  PASS  Run a nix build (echoed, not really built)\n\n\n=================================================================\n Results: 1 passed, 0 failed, 0 skipped (of 1 run)\n=================================================================\n\n", "note": ""}]}, {"md": "## ui_test: headless Qt UI checks (reference only)\n\nThe last feature, `ui_test`, drives a **real Qt application** through\n[logos-qt-mcp](https://github.com/logos-co/logos-qt-mcp): it launches the app\nwith `QT_QPA_PLATFORM=offscreen`, connects to the QML inspector, performs UI\nactions (`click`, `wait_for`, `expect_texts`, `set_text`, `sleep`), and can\ncapture a `screenshot` that the generated docs embed inline.\n\nBecause it needs a built Qt app and the qt-mcp package, it **cannot run in\nthis generic, toolchain-free self-test** \u2014 so unlike `build_overrides` above,\nthe block below is a **reference snippet, not an executed example**. It is the\nshape of a real `ui_test` step (taken from the `logos-tutorial` QML app\ntutorial); for a version that actually runs, see that repo's specs and the\nfull action reference in `docs/spec.md`.\n\n```yaml\n- ui_test:\n    launch: \"nix run .\"\n    setup:\n      - \"nix build 'github:logos-co/logos-qt-mcp' -o result-mcp\"\n    qt_mcp: \"result-mcp\"\n    tests:\n      - name: \"Window opens\"\n        action: wait_for\n        texts: [\"Logos Calculator\"]\n        timeout: 15000\n      - name: \"Click Add\"\n        action: click\n        target: \"Add\"\n        screenshot: \"after-add.png\"\n```\n\nEverything else across these five tutorials needs only Python + PyYAML and\nruns anywhere; `ui_test` is the one feature that requires the Logos UI stack.", "execs": []}]}]}</script>
<script>
  const DATA = JSON.parse(document.getElementById("report-data").textContent);
  if (window.marked) { marked.setOptions({ gfm: true, breaks: false }); }
  const mdToHtml = (s) => window.marked ? marked.parse(s || "") : ("<pre>" + (s || "") + "</pre>");

  const sum = DATA.summary;
  document.getElementById("summary").innerHTML =
    `<span class="pill pass">${sum.passed} passed</span> ` +
    (sum.failed ? `<span class="pill fail">${sum.failed} failed</span> ` : "") +
    (sum.skipped ? `<span class="pill skip">${sum.skipped} skipped</span>` : "");

  const picker = document.getElementById("picker");
  DATA.tutorials.forEach((t, i) => {
    const o = document.createElement("option");
    o.value = i; o.textContent = t.meta.name; picker.appendChild(o);
  });

  function execHtml(e) {
    const badge = `<span class="badge ${e.status}">${e.status.toUpperCase()}</span>`;
    const kind = `<span class="kind">${e.kind}${e.exit_code !== undefined ? " · exit " + e.exit_code : ""}</span>`;
    let h = `<div class="exec"><div class="exec-head">${badge}${kind}</div>`;
    if (e.note) h += `<div class="note">${escapeHtml(e.note)}</div>`;
    if (e.cmd) h += `<pre class="cmd">${escapeHtml(e.cmd)}</pre>`;
    const out = (e.output || "").trim();
    if (out) {
      const long = out.split("\n").length > 12;
      if (long) {
        h += `<details><summary>output (${out.split("\n").length} lines)</summary><pre class="output">${escapeHtml(out)}</pre></details>`;
      } else {
        h += `<pre class="output">${escapeHtml(out)}</pre>`;
      }
    }
    h += `</div>`;
    return h;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
  }

  function render(idx) {
    const t = DATA.tutorials[idx];
    const main = document.getElementById("main");
    main.innerHTML = "";
    const h = document.createElement("div");
    h.className = "tutorial-title";
    h.textContent = t.meta.name + "  —  " + t.meta.platform;
    main.appendChild(h);

    t.rows.forEach(row => {
      const isStructural = row.execs.length === 0 &&
        (/^#\s|^##\s/.test(row.md.trim()));
      const div = document.createElement("div");
      const hasExec = row.execs.length > 0;
      const hasFail = row.execs.some(e => e.status === "fail");
      div.className = "row" + (hasExec ? "" : (isStructural ? " section" : " preamble")) +
        (hasFail ? " has-fail" : "");

      const left = document.createElement("div");
      left.className = "col left";
      left.innerHTML = `<div class="md">${mdToHtml(row.md)}</div>`;
      div.appendChild(left);

      if (hasExec || !isStructural) {
        const right = document.createElement("div");
        right.className = "col right";
        if (hasExec) {
          right.innerHTML = `<div class="col-label">Executed</div>` +
            row.execs.map(execHtml).join("");
        } else {
          right.innerHTML = `<div class="col-label">Executed</div>` +
            `<div class="empty">No commands run for this step.</div>`;
        }
        div.appendChild(right);
      }
      main.appendChild(div);
    });
  }

  picker.addEventListener("change", () => render(+picker.value));
  render(0);
</script>
