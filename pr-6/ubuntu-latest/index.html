n\n```yaml\nname: \"Deliberately broken\"\noutput: broken.md\n\nsections:\n  - title: \"Mismatched expectation\"\n    step: true\n    steps:\n      - title: \"Echo one thing, expect another\"\n        run: \"echo hello\"\n        expect_contains:\n          - \"this string is not in the output\"\n      - title: \"A second step (only reached with --continue-on-fail)\"\n        run: \"echo second-step-ran\"\n        expect_contains:\n          - \"second-step-ran\"\n```", "execs": [{"kind": "file", "cmd": "write broken.test.yaml", "status": "pass", "note": "Wrote broken.test.yaml"}]}, {"md": "### 3.2 Run it \u2014 the failure is reported and the exit code is non-zero\n\nWe add `|| true` so this doc-test can continue past the inner failure and\nassert on the `FAIL` line. The inner `doctest` still exits non-zero \u2014 that\nnon-zero exit is exactly what fails a CI job:\n\n```bash\ndoctest run broken.test.yaml --continue-on-fail\n```\n\nWith `--continue-on-fail`, the runner walked **both** inner steps: the\nfirst failed and the second still ran and passed \u2014 the summary\n`1 passed, 1 failed` proves it reached the second step. Without that\nflag, `doctest run` stops at the first failure (fail-fast), the right\ndefault for local iteration; `--continue-on-fail` is what you want in CI\nso the report captures the whole run.", "execs": [{"kind": "run", "cmd": "nix run github:logos-co/logos-doctest/64c6711f314272c320c75a2f4ef6da3c545e2f28 -- run broken.test.yaml --continue-on-fail || true", "status": "pass", "exit_code": 0, "output": "=================================================================\n Doctest: Deliberately broken\n=================================================================\n\n  spec     : /tmp/doctest-test-e61bo__q/broken.test.yaml\n  workdir  : /tmp/doctest-test-khv3ouz1\n  platform : Linux (ext=so)\n  release  : (none)\n\n-----------------------------------------------------------------\n Section: Mismatched expectation\n-----------------------------------------------------------------\n  FAIL  Echo one thing, expect another\n        expected 'this string is not in the output' not found in output\n        actual:   hello\n  PASS  A second step (only reached with --continue-on-fail)\n\n\n=================================================================\n Results: 1 passed, 1 failed, 0 skipped (of 2 run)\n=================================================================\n\nFailures:\n  FAIL  Echo one thing, expect another\n        expected 'this string is not in the output' not found in output\n        actual:   hello\n\n", "note": ""}]}, {"md": "## Watching a run live (--tui / --iterative)\n\nThe `--report` HTML is written *after* a run finishes. When you want the same\ntwo-column view **live in the terminal as it runs**, use `--tui`:\n\n```bash\ndoctest run examples/hello.test.yaml --tui\n```\n\nThe left pane renders the current step's documentation, the right pane shows\nthe command executing and its output, updating as the run proceeds. Add\n`--iterative` to advance one step at a time, waiting for a keypress (the\ndown/right arrow, or space) before each step; press `q` to quit:\n\n```bash\ndoctest run examples/hello.test.yaml --tui --iterative\n```\n\nTwo things to know:\n\n- `--tui` needs an **interactive terminal** (a TTY) and the\n  [`rich`](https://github.com/Textualize/rich) package. Both are bundled in\n  the doctest flake, so `nix run \u2026 -- run \u2026 --tui` works out of the box; run\n  with a piped/redirected stdout (as CI does) and doctest tells you a TTY is\n  required instead of drawing the UI.\n- `--iterative` only applies together with `--tui` \u2014 using it alone is an\n  error.\n\nBecause the TUI requires a real terminal, this section is **documentation\nonly**: unlike every other step in these tutorials, the commands above are\nnot executed by the doc-test runner (which runs head-less in CI). Everything\n`--tui` shows is the exact same rendered docs and executed commands you get\nfrom `generate` and `--report` \u2014 only the presentation is live.", "execs": []}]}, {"meta": {"name": "Chaining specs and cleaning the output tree", "platform": "Linux (ext=so)", "release": "(none)"}, "rows": [{"md": "# Chaining specs and cleaning the output tree\n\nReal tutorials often come in parts: Part 2 builds on what Part 1 produced. This\ntutorial shows how `requires:` chains specs so a prerequisite runs first in its\nown directory, how `--output-dir` lays the chain out on disk, and how `doctest\nclean` strips an executed tree back to checked-in source. As always, we drive\ninner specs from inside this one.\n\n**What you'll build:** A two-spec chain (a base spec and one that consumes its output), run into a directory you can inspect, then cleaned.\n\n**What you'll learn:**\n\n- How `requires:` declares prerequisite specs, run before the spec that needs them\n- Why chained specs need a `project_name`, and how it names their subdirectory\n- How a later spec references an earlier one's output (`../<project_name>/\u2026`)\n- How `--output-dir` keeps the result on disk instead of a temp dir\n- How `--workdir` / `--keep-workdir` run a single spec into an existing directory\n- How `doctest clean` removes build artifacts, with `--dry-run` and `--keep`\n\n## Prerequisites\n\n- **Nix** with flakes enabled (see the first tutorial).", "execs": []}, {"md": "## Step 1: A base spec to build on\n\nChaining is keyed on `project_name`: each spec in a chain runs in a sibling\ndirectory named by its `project_name`. We start with a base spec that simply\nproduces a marker file other specs can consume.", "execs": []}, {"md": "### 1.1 Write base.test.yaml\n\nNote the `project_name: base-project` \u2014 without it, a spec that\nparticipates in a chain is an error.\n\n```yaml\nname: \"Base project\"\noutput: base.md\nproject_name: base-project\n\nsections:\n  - title: \"Produce an artifact\"\n    step: true\n    steps:\n      - title: \"Write a marker file\"\n        file:\n          path: artifact.txt\n          language: text\n          content: |\n            built-by-base-project\n```", "execs": [{"kind": "file", "cmd": "write base.test.yaml", "status": "pass", "note": "Wrote base.test.yaml"}]}, {"md": "## Step 2: A spec that requires the base\n\nThe second spec declares `requires: [base.test.yaml]`. When you run it,\n`doctest` runs the base first (in `base-project/`), then this spec (in\n`consumer-project/`), so it can read the base's output through the sibling\npath `../base-project/`.", "execs": []}, {"md": "### 2.1 Write consumer.test.yaml\n\n```yaml\nname: \"Consumer project\"\noutput: consumer.md\nproject_name: consumer-project\n\nrequires:\n  - base.test.yaml\n\nsections:\n  - title: \"Use the base's artifact\"\n    step: true\n    steps:\n      - title: \"Read the sibling project's output\"\n        run: \"cat ../base-project/artifact.txt\"\n        expect_contains:\n          - \"built-by-base-project\"\n```\n\n`requires:` is resolved **transitively** and de-duplicated: if A requires\nB and B requires C, running A runs C, then B, then A, each once.", "execs": [{"kind": "file", "cmd": "write consumer.test.yaml", "status": "pass", "note": "Wrote consumer.test.yaml"}]}, {"md": "## Step 3: Run the chain into a directory you keep\n\nBy default a run uses a temp directory that is deleted afterwards. With\n`--output-dir DIR`, the directory is created (if missing) and **kept**, and\nfor a chain it becomes the chain root with one subdirectory per project.", "execs": []}, {"md": "### 3.1 Run the consumer (the base runs first)\n\n```bash\ndoctest run consumer.test.yaml --output-dir ./chain-out\n```\n\nBoth specs ran: the base produced its artifact (a `file` step, which\nwrites without asserting), then the consumer read it back across the\nproject boundary and asserted on it \u2014 the one `PASS` in the summary.", "execs": [{"kind": "run", "cmd": "nix run github:logos-co/logos-doctest/64c6711f314272c320c75a2f4ef6da3c545e2f28 -- run consumer.test.yaml --output-dir ./chain-out", "status": "pass", "exit_code": 0, "output": "=================================================================\n Doctest: Base project\n=================================================================\n\n  spec     : /tmp/doctest-test-6ilype8y/base.test.yaml\n  workdir  : /tmp/doctest-test-6ilype8y/chain-out/base-project\n  platform : Linux (ext=so)\n  release  : (none)\n\n-----------------------------------------------------------------\n Section: Produce an artifact\n-----------------------------------------------------------------\n  wrote   artifact.txt\n\n=================================================================\n Doctest: Consumer project\n=================================================================\n\n  spec     : /tmp/doctest-test-6ilype8y/consumer.test.yaml\n  workdir  : /tmp/doctest-test-6ilype8y/chain-out/consumer-project\n  platform : Linux (ext=so)\n  release  : (none)\n\n-----------------------------------------------------------------\n Section: Use the base's artifact\n-----------------------------------------------------------------\n  PASS  Read the sibling project's output\n\n  output : /tmp/doctest-test-6ilype8y/chain-out\n\n=================================================================\n Results: 1 passed, 0 failed, 0 skipped (of 1 run)\n=================================================================\n\n", "note": ""}]}, {"md": "### 3.2 Inspect the on-disk layout\n\nThe chain root holds one directory per `project_name`, each with that\nproject's files:\n\n```bash\nfind ./chain-out -maxdepth 2 -type f\n```", "execs": [{"kind": "run", "cmd": "find ./chain-out -maxdepth 2 -type f | sort", "status": "pass", "exit_code": 0, "output": "./chain-out/base-project/artifact.txt\n", "note": ""}]}, {"md": "## Step 4: Running into an existing directory (--workdir)\n\n`--output-dir` is the chain-aware option: it *creates* the directory, keeps\nit, and lays out one subdirectory per project. `--workdir` is the simpler\nsibling for a **single** spec: it runs into a directory that **must already\nexist**, ignores any `requires:` chain, and \u2014 unlike `--output-dir` \u2014 deletes\nthat directory on exit *unless* you add `--keep-workdir`.", "execs": []}, {"md": "### 4.1 Write a standalone spec\n\nA one-step spec with no `requires:` \u2014 just produces a file:\n\n```yaml\nname: \"Solo spec\"\noutput: solo.md\nsections:\n  - title: \"Produce a file\"\n    step: true\n    steps:\n      - title: \"Write output.txt\"\n        file:\n          path: output.txt\n          language: text\n          content: |\n            produced-in-workdir\n      - title: \"Verify it\"\n        run: \"cat output.txt\"\n        expect_contains:\n          - \"produced-in-workdir\"\n```", "execs": [{"kind": "file", "cmd": "write solo.test.yaml", "status": "pass", "note": "Wrote solo.test.yaml"}]}, {"md": "### 4.2 Run into a pre-created directory, keeping it\n\n`--workdir` does not create the directory, so we `mkdir` it first.\n`--keep-workdir` stops doctest from deleting it on exit, so we can\ninspect the result:\n\n```bash\nmkdir -p ./my-workdir\ndoctest run solo.test.yaml --workdir ./my-workdir --keep-workdir\n```", "execs": [{"kind": "run", "cmd": "mkdir -p ./my-workdir\nnix run github:logos-co/logos-doctest/64c6711f314272c320c75a2f4ef6da3c545e2f28 -- run solo.test.yaml --workdir ./my-workdir --keep-workdir\n", "status": "pass", "exit_code": 0, "output": "=================================================================\n Doctest: Solo spec\n=================================================================\n\n  spec     : /tmp/doctest-test-6ilype8y/solo.test.yaml\n  workdir  : /tmp/doctest-test-6ilype8y/my-workdir\n  platform : Linux (ext=so)\n  release  : (none)\n\n-----------------------------------------------------------------\n Section: Produce a file\n-----------------------------------------------------------------\n  wrote   output.txt\n  PASS  Verify it\n\n  workdir: /tmp/doctest-test-6ilype8y/my-workdir\n\n=================================================================\n Results: 1 passed, 0 failed, 0 skipped (of 1 run)\n=================================================================\n\n", "note": ""}]}, {"md": "### 4.3 Confirm the directory was kept with its output\n\nBecause of `--keep-workdir`, the directory and the file the spec produced\nare still there:\n\n```bash\ncat ./my-workdir/output.txt\n```\n\nWithout `--keep-workdir`, doctest would have deleted `./my-workdir` (and\neverything in it) when the run finished \u2014 handy for a throwaway check\nagainst a directory you already have, but use `--output-dir` (or add\n`--keep-workdir`) whenever you want to keep the result.", "execs": [{"kind": "run", "cmd": "cat ./my-workdir/output.txt", "status": "pass", "exit_code": 0, "output": "produced-in-workdir\n", "note": ""}]}, {"md": "## Step 5: Clean the executed tree\n\nAn executed `--output-dir` tree mixes generated source with build artifacts\n(out-links, compiled libraries, `modules/`, logs). `doctest clean` removes\nthe artifacts so what remains is committable source. Preview first with\n`--dry-run`, and spare specific patterns with `--keep`.", "execs": []}, {"md": "### 5.1 Add some artifacts to clean\n\nSimulate what a real build leaves behind:\n\n```bash\ntouch result libdemo.so build.log   # leftover build artifacts\n```", "execs": [{"kind": "run", "cmd": "touch ./chain-out/consumer-project/result ./chain-out/consumer-project/libdemo.so ./chain-out/base-project/build.log", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 5.2 Preview removals with --dry-run\n\n`--dry-run` lists what *would* be removed without touching anything:\n\n```bash\ndoctest clean ./chain-out --dry-run\n```", "execs": [{"kind": "run", "cmd": "nix run github:logos-co/logos-doctest/64c6711f314272c320c75a2f4ef6da3c545e2f28 -- clean ./chain-out --dry-run", "status": "pass", "exit_code": 0, "output": "  would remove  consumer-project/libdemo.so\n  would remove  consumer-project/result\n  would remove  base-project/build.log\nclean: would remove 3 artifact(s) under /tmp/doctest-test-6ilype8y/chain-out\n", "note": ""}]}, {"md": "### 5.3 Clean for real, keeping logs\n\nNow remove the artifacts but keep `*.log` files with `--keep`. The\nout-link and the compiled library go; the log stays:\n\n```bash\ndoctest clean ./chain-out --keep '*.log' --verbose\n```", "execs": [{"kind": "run", "cmd": "nix run github:logos-co/logos-doctest/64c6711f314272c320c75a2f4ef6da3c545e2f28 -- clean ./chain-out --keep '*.log' --verbose", "status": "pass", "exit_code": 0, "output": "  removed  consumer-project/libdemo.so\n  removed  consumer-project/result\nclean: removed 2 artifact(s) under /tmp/doctest-test-6ilype8y/chain-out\n", "note": ""}]}, {"md": "### 5.4 Confirm what survived\n\nThe generated source and the kept log remain; the build artifacts are\ngone \u2014 a tree you could check in as-is:\n\n```bash\nfind ./chain-out -type f\n```\n\n`result` and `libdemo.so` are no longer listed: `clean` removed them,\n`--keep '*.log'` preserved `build.log`, and the real source survived.", "execs": [{"kind": "run", "cmd": "find ./chain-out -type f | sort", "status": "pass", "exit_code": 0, "output": "./chain-out/base-project/artifact.txt\n./chain-out/base-project/build.log\n", "note": ""}]}]}, {"meta": {"name": "Combined reports and release pinning", "platform": "Linux (ext=so)", "release": "(none)"}, "rows": [{"md": "# Combined reports and release pinning\n\nThe final tutorial covers the two features you reach for when wiring `doctest`\ninto a real project's CI: running **several specs into one report** (so a repo\nwith many `*.test.yaml` files publishes a single artifact with a dropdown), and\nthe **`{release}` placeholder** that lets one spec target either bleeding-edge\nor a pinned release of the repos it builds. We demonstrate both from inside this\nspec.\n\n**What you'll build:** Two inner specs rendered into a single combined HTML report, plus a spec that pins a GitHub URL via {release}.\n\n**What you'll learn:**\n\n- How `doctest run a.yaml b.yaml --report r.html` combines specs into one report\n- Why the combined report has a per-spec dropdown (one entry per spec)\n- How the `{release}` placeholder expands in `run` commands and rendered docs\n- How `--release TAG` overrides the spec's `release:` field at the CLI\n- How `--release-for REPO=REF` pins a single repo to a tag or commit\n- The recommended `tests/` + `outputs/` project layout for keeping docs honest\n\n## Prerequisites\n\n- **Nix** with flakes enabled (see the first tutorial).", "execs": []}, {"md": "## Step 1: Two specs, one report\n\nA repo usually has more than one spec. Passing them all to a single `doctest\nrun` executes them back-to-back into one `--report`, whose top-right dropdown\nswitches between them \u2014 far tidier than one HTML file per spec.", "execs": []}, {"md": "### 1.1 Write two small specs\n\nTwo independent specs, each a single passing assertion:\n\n```yaml\nname: \"Alpha\"\noutput: alpha.md\nsections:\n  - title: \"Alpha check\"\n    step: true\n    steps:\n      - title: \"Echo alpha\"\n        run: \"echo alpha-ok\"\n        expect_contains:\n          - \"alpha-ok\"\n```", "execs": [{"kind": "file", "cmd": "write alpha.test.yaml", "status": "pass", "note": "Wrote alpha.test.yaml"}]}, {"md": "### 1.2 Write the second spec\n\n```yaml\nname: \"Beta\"\noutput: beta.md\nsections:\n  - title: \"Beta check\"\n    step: true\n    steps:\n      - title: \"Echo beta\"\n        run: \"echo beta-ok\"\n        expect_contains:\n          - \"beta-ok\"\n```", "execs": [{"kind": "file", "cmd": "write beta.test.yaml", "status": "pass", "note": "Wrote beta.test.yaml"}]}, {"md": "### 1.3 Run both into a single report\n\nPass both specs to one `run`. They execute in order and share one report\nfile. `--continue-on-fail` is the CI-friendly choice so the report is\ncomplete even if a spec fails:\n\n```bash\ndoctest run alpha.test.yaml beta.test.yaml --continue-on-fail --report combined.html\n```", "execs": [{"kind": "run", "cmd": "nix run github:logos-co/logos-doctest/64c6711f314272c320c75a2f4ef6da3c545e2f28 -- run alpha.test.yaml beta.test.yaml --continue-on-fail --report combined.html", "status": "pass", "exit_code": 0, "output": "=================================================================\n Doctest: Alpha\n=================================================================\n\n  spec     : /tmp/doctest-test-4_7vl0yb/alpha.test.yaml\n  workdir  : /tmp/doctest-test-cd7lg736\n  platform : Linux (ext=so)\n  release  : (none)\n\n-----------------------------------------------------------------\n Section: Alpha check\n-----------------------------------------------------------------\n  PASS  Echo alpha\n\n=================================================================\n Doctest: Beta\n=================================================================\n\n  spec     : /tmp/doctest-test-4_7vl0yb/beta.test.yaml\n  workdir  : /tmp/doctest-test-d8qtl8o_\n  platform : Linux (ext=so)\n  release  : (none)\n\n-----------------------------------------------------------------\n Section: Beta check\n-----------------------------------------------------------------\n  PASS  Echo beta\n\n\n=================================================================\n Results: 2 passed, 0 failed, 0 skipped (of 2 run)\n=================================================================\n\n  report : /tmp/doctest-test-4_7vl0yb/combined.html\n", "note": ""}]}, {"md": "### 1.4 Confirm the combined report exists", "execs": [{"kind": "check_file", "cmd": "check file: combined.html", "status": "pass", "note": "Found: /tmp/doctest-test-4_7vl0yb/combined.html"}]}, {"md": "### 1.5 Both specs are in the dropdown\n\nThe report's spec picker is populated from the embedded run data \u2014 one\nentry per spec. Both names are present in the single file:\n\n```bash\ngrep -o 'Alpha\\|Beta' combined.html | sort -u\n```\n\nOne report, two dropdown entries. (`--output-dir` and `--tui`, by\ncontrast, operate on a single spec \u2014 pass just one to those.)", "execs": [{"kind": "run", "cmd": "grep -o 'Alpha\\|Beta' combined.html | sort -u", "status": "pass", "exit_code": 0, "output": "Alpha\nBeta\n", "note": ""}]}, {"md": "## Step 2: Pinning versions with the {release} placeholder\n\nSpecs that build GitHub repos often want to target a specific release rather\nthan the latest commit. Anywhere a `run` command, `code_block`, or file body\ncontains the release placeholder, `doctest` expands it \u2014 to `/TAG` when a\nrelease is set, or to nothing when it is empty \u2014 so one spec can render either\nbleeding-edge or pinned instructions without editing URLs by hand.\n\nA spec author writes a flake reference such as\n`github:logos-co/logos-module-builder` followed by the placeholder and\n`#with-external-lib`. With no release it stays bare; with `--release demo-v1`\nit becomes `github:logos-co/logos-module-builder/demo-v1#with-external-lib`.\nBelow we prove both, from inside this spec.", "execs": []}, {"md": "### 2.1 Write an inner spec that uses the placeholder\n\nWe generate the inner spec with a heredoc rather than a `file` step. Why?\nThis outer step is *itself* placeholder-expanded, so a literal token typed\nhere would be substituted by the **outer** run before the inner spec ever\nsaw it. Assembling the braces from a shell variable (`LB='{'`) sidesteps\nthat: the written file ends up with a real placeholder for the **inner**\nrun to expand.\n\n```bash\n# Write pinned.test.yaml. LB/RB assemble the brace token so the OUTER\n# run leaves it intact; the written file gets a real placeholder for the\n# inner run to expand. We reference two repos so the per-repo pin below\n# has something to distinguish.\nLB='{'; RB='}'\ncat > pinned.test.yaml <<EOF\n# ...\nrun: \"echo 'github:logos-co/logos-module-builder${LB}release${RB}#with-external-lib\n             github:logos-co/logos-liblogos${LB}release${RB}'\"\n# ...\nEOF\n```\n\nThe written `pinned.test.yaml` now holds a real release placeholder in its\n`run:` command for **two** repos \u2014 put there without the outer run\nsubstituting them.", "execs": [{"kind": "run", "cmd": "LB='{'; RB='}'\ncat > pinned.test.yaml <<EOF\nname: \"Release placeholder demo\"\noutput: pinned.md\nsections:\n  - title: \"Show the resolved URLs\"\n    step: true\n    steps:\n      - title: \"Print two flake references\"\n        run: \"echo 'github:logos-co/logos-module-builder${LB}release${RB}#with-external-lib github:logos-co/logos-liblogos${LB}release${RB}'\"\n        expect_contains:\n          - \"logos-module-builder\"\nEOF\n", "status": "pass", "exit_code": 0, "output": "", "note": ""}]}, {"md": "### 2.2 Confirm the inner spec was written", "execs": [{"kind": "check_file", "cmd": "check file: pinned.test.yaml", "status": "pass", "note": "Found: /tmp/doctest-test-4_7vl0yb/pinned.test.yaml"}]}, {"md": "### 2.3 Run the inner spec with no release\n\nWith no release set, the placeholder expands to an empty string and the\nURL points at the default branch:\n\n```bash\ndoctest run pinned.test.yaml --verbose\n```", "execs": [{"kind": "run", "cmd": "nix run github:logos-co/logos-doctest/64c6711f314272c320c75a2f4ef6da3c545e2f28 -- run pinned.test.yaml --verbose", "status": "pass", "exit_code": 0, "output": "=================================================================\n Doctest: Release placeholder demo\n=================================================================\n\n  spec     : /tmp/doctest-test-4_7vl0yb/pinned.test.yaml\n  workdir  : /tmp/doctest-test-w1c5smld\n  platform : Linux (ext=so)\n  release  : (none)\n\n-----------------------------------------------------------------\n Section: Show the resolved URLs\n-----------------------------------------------------------------\n        cmd: echo 'github:logos-co/logos-module-builder#with-external-lib github:logos-co/logos-liblogos'\n  PASS  Print two flake references\n\n\n=================================================================\n Results: 1 passed, 0 failed, 0 skipped (of 1 run)\n=================================================================\n\n", "note": ""}]}, {"md": "### 2.4 Run the inner spec with --release\n\n`--release TAG` overrides the spec's `release:` field for the whole run,\nso **every** placeholder now expands to `/TAG` \u2014 both repos move together:\n\n```bash\ndoctest run pinned.test.yaml --release demo-v1 --verbose\n```\n\nBoth URLs picked up `/demo-v1` from the single `--release` flag.", "execs": [{"kind": "run", "cmd": "nix run github:logos-co/logos-doctest/64c6711f314272c320c75a2f4ef6da3c545e2f28 -- run pinned.test.yaml --release demo-v1 --verbose", "status": "pass", "exit_code": 0, "output": "=================================================================\n Doctest: Release placeholder demo\n=================================================================\n\n  spec     : /tmp/doctest-test-4_7vl0yb/pinned.test.yaml\n  workdir  : /tmp/doctest-test-7uvqn8dx\n  platform : Linux (ext=so)\n  release  : demo-v1\n\n-----------------------------------------------------------------\n Section: Show the resolved URLs\n-----------------------------------------------------------------\n        cmd: echo 'github:logos-co/logos-module-builder/demo-v1#with-external-lib github:logos-co/logos-liblogos/demo-v1'\n  PASS  Print two flake references\n\n\n=================================================================\n Results: 1 passed, 0 failed, 0 skipped (of 1 run)\n=================================================================\n\n", "note": ""}]}, {"md": "### 2.5 Pin one repo to a commit with --release-for\n\nOften you want most repos at a release but **one** at a specific commit \u2014\nfor example, a repo's own CI building the exact commit under test while\neverything else stays on the published release. `--release-for REPO=REF`\ndoes that: `REF` is a git tag **or a commit hash**, it is repeatable, and\nit overrides `--release` for that one repo only. Here `logos-module-builder`\nis pinned to a commit while `logos-liblogos` keeps the global `demo-v1`:\n\n```bash\ndoctest run pinned.test.yaml --release demo-v1 --release-for logos-module-builder=abc123def --verbose\n```\n\nOne spec, per-repo control: `logos-module-builder` resolved to the commit\n`abc123def`, while `logos-liblogos` stayed on `demo-v1`. This is exactly\nhow a repo's CI tests *its* commit against the rest of the released stack\n(`--release-for <that-repo>=$GITHUB_SHA`); an empty ref \u2014\n`--release-for REPO=` \u2014 forces a single repo back to latest even when a\nglobal `--release` is set.", "execs": [{"kind": "run", "cmd": "nix run github:logos-co/logos-doctest/64c6711f314272c320c75a2f4ef6da3c545e2f28 -- run pinned.test.yaml --release demo-v1 --release-for logos-module-builder=abc123def --verbose", "status": "pass", "exit_code": 0, "output": "=================================================================\n Doctest: Release placeholder demo\n=================================================================\n\n  spec     : /tmp/doctest-test-4_7vl0yb/pinned.test.yaml\n  workdir  : /tmp/doctest-test-6qnkbwje\n  platform : Linux (ext=so)\n  release  : demo-v1\n  pins     : logos-module-builder=abc123def\n\n-----------------------------------------------------------------\n Section: Show the resolved URLs\n-----------------------------------------------------------------\n        cmd: echo 'github:logos-co/logos-module-builder/abc123def#with-external-lib github:logos-co/logos-liblogos/demo-v1'\n  PASS  Print two flake references\n\n\n=================================================================\n Results: 1 passed, 0 failed, 0 skipped (of 1 run)\n=================================================================\n\n", "note": ""}]}, {"md": "## Putting it together in a project\n\nThe pattern these four tutorials demonstrate is exactly how a real repo wires\n`doctest` into CI:\n\n- Keep specs in a `doctests/` (or `tests/`) directory, one `*.test.yaml` per\n  topic, each both runnable and renderable.\n- In CI, run them all into one report:\n  `doctest run doctests/*.test.yaml --continue-on-fail --report report.html`,\n  publish the HTML, and let the non-zero exit fail the job when the docs\n  drift from the code.\n- Render the committed Markdown with `doctest generate`, and strip executed\n  output trees with `doctest clean` before checking them in.\n\nThis very directory is that pattern applied to `doctest` itself: the specs\nhere are run by `doctest` in CI, and the tool's own documentation is verified\nby the tool. Inception complete.", "execs": []}]}, {"meta": {"name": "The rest of the spec format: binary files, comparison, and Logos hooks", "platform": "Linux (ext=so)", "release": "(none)"}, "rows": [{"md": "# The rest of the spec format: binary files, comparison, and Logos hooks\n\nThe first four tutorials cover the features you reach for daily. This one is a\nguided tour of the **remaining** spec fields: binary `file` content via\n`encoding: base64`, the top-level `comparison` block (this very tutorial uses\none \u2014 see just below its learning objectives), the `release_overrides` spec\nfield, and the opt-in Logos integrations. Of those, `build_overrides` *is*\nexercised for real (its flag-injection needs no toolchain); `ui_test` needs a\nrunning Qt app, so it appears as a clearly-labelled reference snippet rather\nthan an executed example.\n\n**What you'll build:** A spec that round-trips a binary file and one that proves build_overrides injects a Nix flag, plus a reference for ui_test.\n\n**What you'll learn:**\n\n- {'How `encoding': 'base64` writes binary files and renders them as a note'}\n- What the top-level `comparison` field is for (you are reading one)\n- How the `release_overrides` spec field mirrors `--release-for`\n- How `build_overrides` injects `--override-input` into `nix build` commands\n- What a `ui_test` step looks like for headless Qt UI checks (reference only)\n\n**Why a `comparison` block?** It is a free-form Markdown region rendered right\nafter *What you'll learn*, before the first section \u2014 handy for a table or a\nparagraph that frames the tutorial (for instance, contrasting two approaches).\nThis paragraph is itself the `comparison:` field of this spec.\n\n## Prerequisites\n\n- **Nix** with flakes enabled (see the first tutorial). The binary-file section\nruns anywhere; the Logos sections are reference-only.", "execs": []}, {"md": "## Step 1: Binary files with encoding: base64\n\nA `file` step usually carries plain-text `content`. For binary artifacts\n(images, compiled blobs, fixtures) set `encoding: base64` and put the\nbase64 of the bytes in `content`. On `run`, doctest decodes it to disk; on\n`generate`, instead of dumping bytes it renders a `*Binary file: \\`path\\`*`\nnote.", "execs": []}, {"md": "### 1.1 Write a spec that emits a binary file\n\nThe base64 below decodes to the ASCII bytes `doctest-binary-ok`. The\ninner spec writes them, then reads them back to prove the round-trip:\n\n```yaml\nname: \"Binary file demo\"\noutput: binary.md\nsections:\n  - title: \"Round-trip a binary blob\"\n    step: true\n    steps:\n      - title: \"Write blob.bin from base64\"\n        file:\n          path: blob.bin\n          encoding: base64\n          content: |\n            ZG9jdGVzdC1iaW5hcnktb2s=\n      - title: \"Read the decoded bytes back\"\n        run: \"cat blob.bin\"\n        expect_contains:\n          - \"doctest-binary-ok\"\n```", "execs": [{"kind": "file", "cmd": "write binary.test.yaml", "status": "pass", "note": "Wrote binary.test.yaml"}]}, {"md": "### 1.2 Run it \u2014 the bytes round-trip\n\nThe inner spec decodes `blob.bin` and reads it back; its `expect_contains`\nasserts the decoded text, so a passing summary means the round-trip held:\n\n```bash\ndoctest run binary.test.yaml --verbose\n```", "execs": [{"kind": "run", "cmd": "nix run github:logos-co/logos-doctest/64c6711f314272c320c75a2f4ef6da3c545e2f28 -- run binary.test.yaml --verbose", "status": "pass", "exit_code": 0, "output": "=================================================================\n Doctest: Binary file demo\n=================================================================\n\n  spec     : /tmp/doctest-test-j_54a82z/binary.test.yaml\n  workdir  : /tmp/doctest-test-ff473ned\n  platform : Linux (ext=so)\n  release  : (none)\n\n-----------------------------------------------------------------\n Section: Round-trip a binary blob\n-----------------------------------------------------------------\n  wrote   blob.bin\n        cmd: cat blob.bin\n  PASS  Read the decoded bytes back\n\n\n=================================================================\n Results: 1 passed, 0 failed, 0 skipped (of 1 run)\n=================================================================\n\n", "note": ""}]}, {"md": "### 1.3 Generate it \u2014 the binary renders as a note\n\n`generate` never dumps raw bytes into the Markdown; it emits a short\nnote pointing at the file instead:\n\n```bash\ndoctest generate binary.test.yaml -o binary.md\n```\n\nSo a spec stays readable even when it ships fixtures \u2014 the bytes live in\n`content`, the docs show a tidy reference.", "execs": [{"kind": "run", "cmd": "nix run github:logos-co/logos-doctest/64c6711f314272c320c75a2f4ef6da3c545e2f28 -- generate binary.test.yaml -o binary.md && cat binary.md", "status": "pass", "exit_code": 0, "output": "Generated: /tmp/doctest-test-j_54a82z/binary.md\n# Binary file demo\n\n## Step 1: Round-trip a binary blob\n\n### 1.1 Write blob.bin from base64\n\n*Binary file: `blob.bin`*\n\n### 1.2 Read the decoded bytes back\n\n```bash\ncat blob.bin\n```\n", "note": ""}]}, {"md": "## Step 2: Per-repo release pins in the spec (release_overrides)\n\nTutorial 4 pinned a single repo from the CLI with `--release-for\nREPO=REF`. The same thing can live **in the spec** under a top-level\n`release_overrides:` map, so a spec carries its own per-repo defaults; a CLI\n`--release-for` still wins on conflicts. We confirm doctest accepts the\nfield by generating a spec that declares it.", "execs": []}, {"md": "### 2.1 Write a spec carrying release_overrides\n\n```yaml\nname: \"Override demo\"\noutput: overrides.md\nrelease: \"demo-v1\"\nrelease_overrides:\n  logos-module-builder: \"abc123def\"\nsections:\n  - title: \"Just framing\"\n    step: true\n    steps:\n      - title: \"A note\"\n        text: \"This spec pins logos-module-builder to a commit by default.\"\n```", "execs": [{"kind": "file", "cmd": "write overrides.test.yaml", "status": "pass", "note": "Wrote overrides.test.yaml"}]}, {"md": "### 2.2 Generate it (the field is accepted and the doc renders)\n\n```bash\ndoctest generate overrides.test.yaml -o overrides.md\n```\n\nAt run time, any `github:logos-co/logos-module-builder` URL in\nthat spec would resolve to `/abc123def`, while every other repo would use\nthe spec's global `release: demo-v1` \u2014 exactly like passing\n`--release-for logos-module-builder=abc123def --release demo-v1` on the\ncommand line.", "execs": [{"kind": "run", "cmd": "nix run github:logos-co/logos-doctest/64c6711f314272c320c75a2f4ef6da3c545e2f28 -- generate overrides.test.yaml -o overrides.md && cat overrides.md", "status": "pass", "exit_code": 0, "output": "Generated: /tmp/doctest-test-j_54a82z/overrides.md\n# Override demo\n\n## Step 1: Just framing\n\n### 1.1 A note\n\nThis spec pins logos-module-builder to a commit by default.\n", "note": ""}]}, {"md": "## Step 3: build_overrides: inject Nix --override-input flags\n\n`build_overrides` is a top-level map that injects `--override-input` flags\ninto every command containing `nix build`, so a tutorial can build against a\nlocal checkout instead of the pinned flake input. Keys are input names,\nvalues are paths relative to the spec. It only affects **execution**;\n`generate` ignores it, so the published docs keep the clean commands.\n\nUnlike `ui_test` below, this *is* executable without the Logos toolchain \u2014\nthe injection is pure string rewriting \u2014 so we prove it for real. We point\nan override at a local directory and assert that the flag is spliced into a\n`nix build` command.", "execs": []}, {"md": "### 3.1 Create the directory the override points at\n\nThe override path must exist on disk, or the runner emits a warning and\nskips it. A bare directory is enough for this demonstration:\n\n```bash\nmkdir -p ./fake-sdk\n```", "execs": [{"kind": "run", "cmd": "mkdir -p ./fake-sdk && echo created", "status": "pass", "exit_code": 0, "output": "created\n", "note": ""}]}, {"md": "### 3.2 Write a spec that declares build_overrides\n\n```yaml\nname: \"build_overrides demo\"\noutput: ob.md\nbuild_overrides:\n  logos-cpp-sdk: ./fake-sdk\nsections:\n  - title: \"A build command\"\n    step: true\n    steps:\n      - title: \"Run a nix build (echoed, not really built)\"\n        run: \"echo 'nix build .#demo'\"\n        expect_contains:\n          - \"--override-input logos-cpp-sdk\"\n```", "execs": [{"kind": "file", "cmd": "write overrides-build.test.yaml", "status": "pass", "note": "Wrote overrides-build.test.yaml"}]}, {"md": "### 3.3 Run it \u2014 the override flag is injected\n\nThe inner spec's command is `echo 'nix build .#demo'`. Because it\ncontains `nix build`, the runner appends the override flag before\nexecuting \u2014 and the inner `expect_contains` asserts the flag is present,\nso a passing summary proves the injection happened:\n\n```bash\ndoctest run overrides-build.test.yaml --verbose\n```\n\nThe executed command became\n`echo 'nix build .#demo' --override-input logos-cpp-sdk path:\u2026/fake-sdk`.\nIn a real tutorial the value would be a sibling checkout\n(e.g. `../logos-cpp-sdk`) so `nix build` resolves against your local\ncode; `generate` would still render the plain `nix build .#demo`.", "execs": [{"kind": "run", "cmd": "nix run github:logos-co/logos-doctest/64c6711f314272c320c75a2f4ef6da3c545e2f28 -- run overrides-build.test.yaml --verbose", "status": "pass", "exit_code": 0, "output": "=================================================================\n Doctest: build_overrides demo\n=================================================================\n\n  spec     : /tmp/doctest-test-j_54a82z/overrides-build.test.yaml\n  workdir  : /tmp/doctest-test-svn10gle\n  platform : Linux (ext=so)\n  release  : (none)\n  overrides: --override-input logos-cpp-sdk path:/tmp/doctest-test-j_54a82z/fake-sdk\n\n-----------------------------------------------------------------\n Section: A build command\n-----------------------------------------------------------------\n        cmd: echo 'nix build .#demo' --override-input logos-cpp-sdk path:/tmp/doctest-test-j_54a82z/fake-sdk\n  PASS  Run a nix build (echoed, not really built)\n\n\n=================================================================\n Results: 1 passed, 0 failed, 0 skipped (of 1 run)\n=================================================================\n\n", "note": ""}]}, {"md": "## ui_test: headless Qt UI checks (reference only)\n\nThe last feature, `ui_test`, drives a **real Qt application** through\n[logos-qt-mcp](https://github.com/logos-co/logos-qt-mcp): it launches the app\nwith `QT_QPA_PLATFORM=offscreen`, connects to the QML inspector, performs UI\nactions (`click`, `wait_for`, `expect_texts`, `set_text`, `sleep`), and can\ncapture a `screenshot` that the generated docs embed inline.\n\nBecause it needs a built Qt app and the qt-mcp package, it **cannot run in\nthis generic, toolchain-free self-test** \u2014 so unlike `build_overrides` above,\nthe block below is a **reference snippet, not an executed example**. It is the\nshape of a real `ui_test` step (taken from the `logos-tutorial` QML app\ntutorial); for a version that actually runs, see that repo's specs and the\nfull action reference in `docs/spec.md`.\n\n```yaml\n- ui_test:\n    launch: \"nix run .\"\n    setup:\n      - \"nix build 'github:logos-co/logos-qt-mcp' -o result-mcp\"\n    qt_mcp: \"result-mcp\"\n    tests:\n      - name: \"Window opens\"\n        action: wait_for\n        texts: [\"Logos Calculator\"]\n        timeout: 15000\n      - name: \"Click Add\"\n        action: click\n        target: \"Add\"\n        screenshot: \"after-add.png\"\n```\n\nEverything else across these five tutorials needs only Python + PyYAML and\nruns anywhere; `ui_test` is the one feature that requires the Logos UI stack.", "execs": []}]}, {"meta": {"name": "Automating a repo's doc-tests with a run.sh", "platform": "Linux (ext=so)", "release": "(none)"}, "rows": [{"md": "# Automating a repo's doc-tests with a run.sh\n\nThe first five tutorials drove `doctest` one command at a time. A real repo\nkeeps its specs under `doctests/` and wraps them in a tiny `run.sh` so a single\ncommand executes every spec and regenerates its Markdown \u2014 the same loop CI\nruns, reproducible on a laptop. This tutorial builds that `run.sh` from scratch,\nruns it for real against an inner spec, and then shows the fuller variant used\nby repos that test their own commit (the shape of\n[`logos-package-manager/doctests/run.sh`](https://github.com/logos-co/logos-package-manager/blob/master/doctests/run.sh)).\nAs always, every command here is executed by the outer `doctest`, and inside it\nwe author and run a smaller spec.\n\n**What you'll build:** A doctests/ layout with a run.sh that executes every *.test.yaml and renders its Markdown into outputs/, run end-to-end.\n\n**What you'll learn:**\n\n- The conventional `doctests/` layout \u2014 specs in, rendered Markdown out\n- How a `run.sh` loops over `*.test.yaml`, calling `run` then `generate`\n- Why the `DOCTEST` override lets the same script use a local checkout or the flake\n- How `--continue-on-fail` keeps the loop going so every spec is exercised\n- How to pin the repo-under-test to its own commit with `--release-for`\n- Where the run leaves outputs (`outputs/`) and which are source vs. artifacts\n\n## Prerequisites\n\n- **Nix** with flakes enabled (see the first tutorial). `bash` and `git` from\nthe ambient environment \u2014 both are present on any CI runner and most laptops.", "execs": []}, {"md": "## The doctests/ convention\n\nAcross the Logos repos the pattern is identical: a `doctests/` directory\nholds one or more `*.test.yaml` specs (the **source of truth**) plus a\n`run.sh` that executes them and writes rendered Markdown into `outputs/`.\n\n```\n<repo>/\n\u2514\u2500\u2500 doctests/\n    \u251c\u2500\u2500 01-something.test.yaml     # spec(s) \u2014 committed\n    \u251c\u2500\u2500 02-another.test.yaml\n    \u251c\u2500\u2500 run.sh                     # the wrapper \u2014 committed\n    \u2514\u2500\u2500 outputs/                   # rendered .md \u2014 committed; run artifacts gitignored\n```\n\n`run.sh` does nothing the earlier tutorials didn't: for each spec it calls\n`doctest run` (execute + assert) then `doctest generate` (render Markdown).\nThe value is that it does so for *every* spec, the same way locally and in\nCI, with one command.", "execs": []}, {"md": "## Step 1: Write the specs the script will drive\n\n`run.sh` globs `*.test.yaml`, so the directory needs at least one spec. We\nwrite a tiny one that produces a file and asserts on it \u2014 enough to watch the\nwhole loop run.", "execs": []}, {"md": "### 1.1 Create demo.test.yaml\n\n```yaml\nname: \"Demo spec\"\noutput: demo.md\n\nintro: |\n  A throwaway spec so run.sh has something to execute.\n\nsections:\n  - title: \"Produce and verify a file\"\n    step: true\n    steps:\n      - title: \"Write hello.txt\"\n        file:\n          path: hello.txt\n          language: text\n          content: |\n            hi from the run.sh demo\n      - title: \"Read it back and assert\"\n        run: \"cat hello.txt\"\n        expect_contains:\n          - \"hi from the run.sh demo\"\n```", "execs": [{"kind": "file", "cmd": "write demo.test.yaml", "status": "pass", "note": "Wrote demo.test.yaml"}]}, {"md": "## Step 2: Write run.sh\n\nThe script has four moving parts: it `cd`s to its own directory (so it works\nfrom anywhere), resolves the `doctest` CLI from a `DOCTEST` override (default:\nthe published flake), clears and recreates `outputs/`, then loops over every\nspec running and generating it. `--continue-on-fail` makes the loop walk every\nstep of every spec so the run is complete even when something fails \u2014 the\n`doctest run` exit code still turns non-zero, which is what fails CI.", "execs": []}, {"md": "### 2.1 Create run.sh\n\n`read -r -a DOCTEST <<< \"${DOCTEST:-\u2026}\"` splits the override into an array\nso a multi-word command (`nix run \u2026 --`) expands correctly. Export\n`DOCTEST` to point at a local checkout instead \u2014 e.g.\n`DOCTEST=\"python3 ../doctest.py\" ./run.sh`.\n\n```bash\n#!/usr/bin/env bash\n#\n# Execute every doc-test in this directory end-to-end and regenerate its\n# Markdown. For each *.test.yaml, `doctest run` executes the spec and\n# asserts on the output; `doctest generate` renders it to outputs/.\n#\n# Override the runner by exporting DOCTEST (space-separated command), e.g.\n#   DOCTEST=\"nix run path:../../logos-doctest --\" ./run.sh\nset -euo pipefail\n\n# Run from this directory regardless of where the script is invoked from.\ncd \"$(dirname \"$0\")\"\n\n# The doctest CLI. Override by exporting DOCTEST.\nread -r -a DOCTEST <<< \"${DOCTEST:-nix run github:logos-co/logos-doctest --}\"\nOUTPUT_DIR=\"./outputs\"\n\necho \"==> Clearing previous ${OUTPUT_DIR}/\"\n# A prior run may have copied read-only artifacts here; restore perms first.\nif [ -e \"${OUTPUT_DIR}\" ]; then\n  chmod -R u+w \"${OUTPUT_DIR}\" 2>/dev/null || true\nfi\nrm -rf \"${OUTPUT_DIR}\"\nmkdir -p \"${OUTPUT_DIR}\"\n\nfor spec in *.test.yaml; do\n  name=\"$(basename \"${spec%.test.yaml}\")\"\n  echo \"==> Running ${spec}\"\n  \"${DOCTEST[@]}\" run \"${spec}\" --verbose --continue-on-fail\n\n  echo \"==> Generating ${OUTPUT_DIR}/${name}.md\"\n  \"${DOCTEST[@]}\" generate \"${spec}\" -o \"${OUTPUT_DIR}/${name}.md\"\ndone\n\necho \"==> Done. Rendered docs are in ${OUTPUT_DIR#./}/\"\n```\n\nThat is the whole wrapper \u2014 under 30 lines, and identical in spirit to\n[doctest's own `doctests/run.sh`](https://github.com/logos-co/logos-doctest/blob/master/doctests/run.sh).", "execs": [{"kind": "file", "cmd": "write run.sh", "status": "pass", "note": "Wrote run.sh"}]}, {"md": "## Step 3: Run it\n\nMake the script executable and run it. We pass `DOCTEST` so the inner\n`doctest` resolves to the same CLI the outer run is using; omit it and the\nscript falls back to the published flake.", "execs": []}, {"md": "### 3.1 Execute the whole suite\n\nWatch the loop: it clears `outputs/`, runs `demo.test.yaml` (the inner\nassertion passes), then renders `outputs/demo.md`:\n\n```bash\nchmod +x run.sh\n./run.sh\n```\n\nOne command executed the spec, asserted on it, and rendered its docs \u2014\nexactly what CI does, minus the report and publishing (the next tutorial).", "execs": [{"kind": "run", "cmd": "chmod +x run.sh\nDOCTEST=\"nix run github:logos-co/logos-doctest/64c6711f314272c320c75a2f4ef6da3c545e2f28 --\" bash ./run.sh\n", "status": "pass", "exit_code": 0, "output": "==> Clearing previous ./outputs/\n==> Running demo.test.yaml\n=================================================================\n Doctest: Demo spec\n=================================================================\n\n  spec     : /tmp/doctest-test-y98dr7ou/demo.test.yaml\n  workdir  : /tmp/doctest-test-q84_yg4a\n  platform : Linux (ext=so)\n  release  : (none)\n\n-----------------------------------------------------------------\n Section: Produce and verify a file\n-----------------------------------------------------------------\n  wrote   hello.txt\n        cmd: cat hello.txt\n  PASS  Read it back and assert\n\n\n=================================================================\n Results: 1 passed, 0 failed, 0 skipped (of 1 run)\n=================================================================\n\n==> Generating ./outputs/demo.md\nGenerated: /tmp/doctest-test-y98dr7ou/outputs/demo.md\n==> Done. Rendered docs are in outputs/\n", "note": ""}]}, {"md": "### 3.2 Confirm the rendered Markdown was written", "execs": [{"kind": "check_file", "cmd": "check file: outputs/demo.md", "status": "pass", "note": "Found: /tmp/doctest-test-y98dr7ou/outputs/demo.md"}]}, {"md": "### 3.3 Inspect what the loop produced\n\nThe rendered tutorial carries the spec's `name` as its title and the\nfile's contents, generated from the spec that was just verified:\n\n```bash\ncat outputs/demo.md\n```", "execs": [{"kind": "run", "cmd": "cat outputs/demo.md", "status": "pass", "exit_code": 0, "output": "# Demo spec\n\nA throwaway spec so run.sh has something to execute.\n\n## Step 1: Produce and verify a file\n\n### 1.1 Write hello.txt\n\n```text\nhi from the run.sh demo\n```\n\n### 1.2 Read it back and assert\n\n```bash\ncat hello.txt\n```\n", "note": ""}]}, {"md": "## Step 4: Pinning the repo under test (--release-for)\n\nThe demo above had no GitHub URLs, so the default `run.sh` was enough. A repo\nwhose specs build *itself* \u2014 `nix build 'github:logos-co/<repo>'` \u2014 needs one\naddition: by default that URL resolves to **latest master**, not the commit\nyou are testing. `--release-for <repo>=<commit>` rewrites the release\nplaceholder on that URL to a specific commit, so the doc-tests exercise the\ncode in front of you.\n\nThis is the only difference between the minimal `run.sh` above and the fuller\none in repos like `logos-package-manager`. It resolves `COMMIT` from\n`git rev-parse HEAD` (override by exporting `COMMIT`, or set `COMMIT=\"\"` to\nfall back to latest) and threads `--release-for` through both `run` and\n`generate`:\n\n```bash\n#!/usr/bin/env bash\nset -euo pipefail\ncd \"$(dirname \"$0\")\"\n\nread -r -a DOCTEST <<< \"${DOCTEST:-nix run github:logos-co/logos-doctest --}\"\n\n# Pin github:logos-co/<repo> in every spec to THIS checkout's commit, so the\n# doc-tests build exactly what's here rather than the latest published flake.\n# nix fetches the commit from the GitHub remote, so it must be pushed; set\n# COMMIT=\"\" (or push first) to fall back to latest.\nCOMMIT=\"${COMMIT-$(git rev-parse HEAD)}\"\nRELEASE_FOR=()\nif [ -n \"${COMMIT}\" ]; then\n  RELEASE_FOR=(--release-for \"myrepo=${COMMIT}\")\n  echo \"==> Pinning myrepo to ${COMMIT}\"\nelse\n  echo \"==> COMMIT empty; building myrepo from latest\"\nfi\n\nmkdir -p outputs\nfor spec in *.test.yaml; do\n  name=\"$(basename \"${spec%.test.yaml}\")\"\n  # The ${RELEASE_FOR[@]+...} guard keeps an empty array from tripping\n  # `set -u` on older bash (e.g. macOS's stock 3.2).\n  \"${DOCTEST[@]}\" run \"${spec}\" --verbose --continue-on-fail \\\n    ${RELEASE_FOR[@]+\"${RELEASE_FOR[@]}\"}\n  \"${DOCTEST[@]}\" generate \"${spec}\" \\\n    ${RELEASE_FOR[@]+\"${RELEASE_FOR[@]}\"} \\\n    -o \"outputs/${name}.md\"\ndone\n```\n\nReplace `myrepo` with your repo's GitHub name. Tutorial 4 covers\n`--release-for` (and per-repo pins) in depth; here it is just the one flag\nthat makes a self-building suite test the right commit.", "execs": []}, {"md": "## outputs/: source vs. artifacts\n\n`run.sh` writes everything under `outputs/`, but not all of it is the same\nkind of thing:\n\n- The rendered `outputs/*.md` are **generated source** \u2014 commit them so the\n  repo always shows the latest docs (the `.gitignore` pattern\n  `outputs/*` + `!outputs/*.md` keeps the Markdown, drops the rest).\n- Anything a spec *builds* into its workdir (out-links, compiled libraries,\n  copied `modules/`, logs) is a **disposable artifact**. When a suite runs\n  with `--output-dir` (rather than the auto-deleted temp dir), strip those\n  with `doctest clean outputs/` before committing \u2014 Tutorial 3 covers it, and\n  `logos-tutorial`'s `run.sh` chains `run` \u2192 `generate` \u2192 `clean` for exactly\n  this reason.\n\nWith a `run.sh` in place, the suite is reproducible with one command. The\nnext tutorial takes the same two calls \u2014 `run` and `generate` \u2014 and wires\nthem into CI, adding a published HTML report.", "execs": []}]}, {"meta": {"name": "Running doc-tests in CI and publishing reports to GitHub Pages", "platform": "Linux (ext=so)", "release": "(none)"}, "rows": [{"md": "# Running doc-tests in CI and publishing reports to GitHub Pages\n\nThe previous tutorial wrapped a repo's specs in a `run.sh`. This one takes the\nsame two calls \u2014 `doctest run` and `doctest generate` \u2014 and wires them into\n**GitHub Actions**, then publishes the two-column HTML **report** to **GitHub\nPages** with a clickable link on every pull request. The result is the workflow\nshared, almost verbatim, by\n[`logos-package-manager`](https://github.com/logos-co/logos-package-manager/blob/master/.github/workflows/doctests.yml),\n[`logos-liblogos`](https://github.com/logos-co/logos-liblogos/blob/master/.github/workflows/doctests.yml),\nand [`logos-tutorial`](https://github.com/logos-co/logos-tutorial/blob/master/.github/workflows/ci.yml).\n\nWe can't launch GitHub Actions from inside a doc-test, so the workflow YAML here\nis a **reference you write to disk and inspect** rather than an executed job. But\nthe command at the heart of it \u2014 the one that produces the publishable\n`index.html` report \u2014 *is* run for real, against an inner spec, so you see the\nexact artifact CI uploads.\n\n**What you'll build:** The report-producing command CI runs (executed for real) plus a complete, annotated GitHub Actions workflow that publishes the report to GitHub Pages.\n\n**What you'll learn:**\n\n- Which single `doctest run \u2026 --report index.html` command CI uses, and why\n- Why all specs go through one `run` invocation (one combined report, one dropdown)\n- How `--release-for $SHA` makes CI test the commit under test, not latest master\n- The two-job workflow shape \u2014 test (matrix) then publish \u2014 and what each does\n- How `peaceiris/actions-gh-pages` publishes per-PR report directories to Pages\n- The one-time repo setting that turns on the gh-pages site, and the fork caveat\n\n## Prerequisites\n\n- **Nix** with flakes enabled (see the first tutorial). The executed section\nneeds only the `doctest` flake; the workflow section is reference YAML.\n\n- A repo with a `doctests/` directory of `*.test.yaml` specs (Tutorial 6) whose\nGitHub Actions you can enable.", "execs": []}, {"md": "## Step 1: The command CI actually runs\n\nStrip the workflow down and one command does the real work: a **single**\n`doctest run` over *all* specs, writing a combined HTML report named\n`index.html`. Passing every spec to one invocation is deliberate \u2014 the report\ngets a top dropdown that switches between specs; running one spec per\ninvocation would emit a separate file each and lose the dropdown. Naming it\n`index.html` means the published directory URL renders it directly.", "execs": []}, {"md": "### 1.1 Write a spec for CI to run\n\nA tiny spec so the report has real content:\n\n```yaml\nname: \"CI demo\"\noutput: ci-demo.md\nsections:\n  - title: \"A step CI will report on\"\n    step: true\n    steps:\n      - title: \"Emit a line and assert on it\"\n        run: \"echo built-in-ci\"\n        expect_contains:\n          - \"built-in-ci\"\n```", "execs": [{"kind": "file", "cmd": "write ci-demo.test.yaml", "status": "pass", "note": "Wrote ci-demo.test.yaml"}]}, {"md": "### 1.2 Produce the combined report exactly as CI does\n\nThis is the workflow's core step, verbatim except for the report path:\none `run`, every `*.test.yaml`, `--continue-on-fail` so the report\ncaptures the whole run, and `--report \u2026/index.html`. (`--release-for` is\nadded in the real workflow; we cover it below.)\n\n```bash\nmkdir -p \"${{ runner.temp }}/reports\"\nnix run github:logos-co/logos-doctest -- run \\\n  doctests/*.test.yaml \\\n  --verbose \\\n  --continue-on-fail \\\n  --release-for \"myrepo=${{ steps.commit.outputs.sha }}\" \\\n  --report \"${{ runner.temp }}/reports/index.html\"\n```\n\n`--continue-on-fail` makes the run walk every step so the published report\nis complete; the command still exits non-zero if any step failed, which is\nwhat fails the CI job. The displayed command shows the production form \u2014\n`doctests/*.test.yaml` and the `--release-for` pin explained below.", "execs": [{"kind": "run", "cmd": "mkdir -p ./reports\nnix run github:logos-co/logos-doctest/64c6711f314272c320c75a2f4ef6da3c545e2f28 -- run \\\n  ci-demo.test.yaml \\\n  --verbose \\\n  --continue-on-fail \\\n  --report ./reports/index.html\n", "status": "pass", "exit_code": 0, "output": "=================================================================\n Doctest: CI demo\n=================================================================\n\n  spec     : /tmp/doctest-test-webs4y2k/ci-demo.test.yaml\n  workdir  : /tmp/doctest-test-cvx_42bx\n  platform : Linux (ext=so)\n  release  : (none)\n\n-----------------------------------------------------------------\n Section: A step CI will report on\n-----------------------------------------------------------------\n        cmd: echo built-in-ci\n  PASS  Emit a line and assert on it\n\n\n=================================================================\n Results: 1 passed, 0 failed, 0 skipped (of 1 run)\n=================================================================\n\n  report : /tmp/doctest-test-webs4y2k/reports/index.html\n", "note": ""}]}, {"md": "### 1.3 Confirm the publishable report exists", "execs": [{"kind": "check_file", "cmd": "check file: reports/index.html", "status": "pass", "note": "Found: /tmp/doctest-test-webs4y2k/reports/index.html"}]}, {"md": "### 1.4 It is the self-contained two-column report\n\nThe same report Tutorial 2 introduced: rendered docs on the left, the\ncommands actually run and their output on the right \u2014 a single HTML file,\nready to upload as-is:\n\n```bash\ngrep 'Tutorial Execution Report' reports/index.html\n```", "execs": [{"kind": "run", "cmd": "grep -o 'Tutorial Execution Report' reports/index.html | head -1", "status": "pass", "exit_code": 0, "output": "Tutorial Execution Report\n", "note": ""}]}, {"md": "## Step 2: Testing the commit under test (--release-for)\n\nA repo whose specs build *itself* (`nix build 'github:logos-co/<repo>'`)\nhits the same issue Tutorial 6 raised: that URL resolves to **latest\nmaster**, not the commit CI is testing. The workflow resolves the commit and\npasses `--release-for <repo>=$SHA` so the doc-tests build exactly that commit\nwhile every other URL stays on its release. One subtlety makes it robust on\nforks:", "execs": []}, {"md": "### 2.1 The commit-resolution step (reference)\n\nA PR's head commit lives in the contributor's fork, not in\n`logos-co/<repo>`, so `github:logos-co/<repo>/<fork-sha>` can't be\nfetched. The step blanks the SHA for fork PRs, which pins that repo to\n*latest* \u2014 the doc-tests still run, just against master:\n\n```yaml\n- name: Resolve commit under test\n  id: commit\n  shell: bash\n  run: |\n    if [ \"${{ github.event_name }}\" = \"pull_request\" ] && \\\n       [ \"${{ github.event.pull_request.head.repo.fork }}\" = \"true\" ]; then\n      echo \"sha=\" >> \"$GITHUB_OUTPUT\"\n      echo \"Fork PR \u2014 doc-tests will run against latest master.\"\n    else\n      echo \"sha=${{ github.event.pull_request.head.sha || github.sha }}\" >> \"$GITHUB_OUTPUT\"\n    fi\n```\n\n`steps.commit.outputs.sha` is then threaded into the `--release-for` flag\nof both the `run` and the `generate` calls. Tutorial 4 covers\n`--release-for` (and the empty-ref fork fallback) in full.", "execs": []}, {"md": "## Step 3: The full workflow\n\nPutting it together: a `test` job (matrixed over Linux and macOS) runs the\nreport command above and uploads the `index.html` as an artifact, then a\n`publish-report` job arranges those artifacts into a site directory and\npushes it to the `gh-pages` branch with\n[`peaceiris/actions-gh-pages`](https://github.com/peaceiris/actions-gh-pages),\ncommenting the links on the PR. We write the whole file to disk so you can\nread it end-to-end, then assert the publishing-critical lines are present.", "execs": []}, {"md": "### 3.1 Write .github/workflows/doctests.yml\n\nReplace `myrepo` with your repo's GitHub name (it appears only in the\n`--release-for` pin and the artifact/report titles). Everything else is\nrepo-agnostic:\n\n```yaml\nname: Doc-Tests\n\n# Runs the executable doc-tests (doctests/*.test.yaml) via the shared\n# doctest CLI and publishes the HTML report to GitHub Pages.\n#\n# \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n# One-time setup for the clickable report links to work:\n#\n#   Repo Settings \u2192 Pages \u2192 \"Build and deployment\" \u2192 Source:\n#   \"Deploy from a branch\", Branch: `gh-pages` / `(root)`.\n#   (The publish-report job creates the gh-pages branch on first run.)\n#\n# Each run publishes the report to:\n#   https://<owner>.github.io/<repo>/pr-<N>/<os>/   (pull requests)\n#   https://<owner>.github.io/<repo>/main/<os>/     (pushes to main)\n# and (for PRs) posts/updates a comment with the links.\n#\n# Fork PRs get a read-only GITHUB_TOKEN, so the Pages push and PR\n# comment are skipped for them \u2014 the downloadable artifact still uploads.\n# \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n\non:\n  pull_request:\n    branches: [master, main]\n  push:\n    branches: [master, main]\n\nconcurrency:\n  group: doctests-${{ github.ref }}\n  cancel-in-progress: true\n\njobs:\n  doctests:\n    name: Run doc-tests (${{ matrix.os }})\n    strategy:\n      fail-fast: false\n      matrix:\n        os: [ubuntu-latest, macos-latest]\n    runs-on: ${{ matrix.os }}\n    timeout-minutes: 60\n\n    steps:\n      - name: Checkout\n        uses: actions/checkout@v4\n\n      - name: Install Nix\n        uses: DeterminateSystems/nix-installer-action@main\n\n      - name: Setup Cachix\n        uses: cachix/cachix-action@v15\n        with:\n          name: logos-co\n          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'\n\n      # Resolve the commit under test (PR head, or pushed commit).\n      # Blank it for fork PRs so the inner build falls back to latest.\n      - name: Resolve commit under test\n        id: commit\n        shell: bash\n        run: |\n          if [ \"${{ github.event_name }}\" = \"pull_request\" ] && \\\n             [ \"${{ github.event.pull_request.head.repo.fork }}\" = \"true\" ]; then\n            echo \"sha=\" >> \"$GITHUB_OUTPUT\"\n            echo \"Fork PR \u2014 doc-tests will run against latest master.\"\n          else\n            echo \"sha=${{ github.event.pull_request.head.sha || github.sha }}\" >> \"$GITHUB_OUTPUT\"\n          fi\n\n      # One `run` over every spec \u2192 one combined report (index.html)\n      # whose dropdown switches between specs. --continue-on-fail keeps\n      # the report complete; the job still fails if any step did.\n      - name: Run every doc-test\n        run: |\n          mkdir -p \"${{ runner.temp }}/reports\"\n          nix run github:logos-co/logos-doctest -- run \\\n            doctests/*.test.yaml \\\n            --verbose \\\n            --continue-on-fail \\\n            --release-for \"myrepo=${{ steps.commit.outputs.sha }}\" \\\n            --report \"${{ runner.temp }}/reports/index.html\"\n\n      - name: Verify markdown generation\n        run: |\n          for spec in doctests/*.test.yaml; do\n            name=\"$(basename \"${spec%.test.yaml}\")\"\n            nix run github:logos-co/logos-doctest -- generate \"$spec\" \\\n              --release-for \"myrepo=${{ steps.commit.outputs.sha }}\" \\\n              -o \"/tmp/${name}.md\"\n            test -s \"/tmp/${name}.md\"\n          done\n\n      - name: Upload execution report\n        if: always()\n        uses: actions/upload-artifact@v4\n        with:\n          name: doctest-reports-${{ matrix.os }}\n          path: ${{ runner.temp }}/reports/\n          if-no-files-found: warn\n\n  publish-report:\n    name: Publish reports to GitHub Pages\n    needs: doctests\n    # Run even on failure \u2014 that's when you most want the report. Skip\n    # forks, where GITHUB_TOKEN can't push to gh-pages or comment.\n    if: ${{ always() && github.event.pull_request.head.repo.fork != true }}\n    runs-on: ubuntu-latest\n\n    permissions:\n      contents: write          # push to the gh-pages branch\n      pull-requests: write      # post/update the PR comment\n\n    # Serialize Pages pushes so two refs can't race on gh-pages.\n    concurrency:\n      group: gh-pages-publish\n      cancel-in-progress: false\n\n    steps:\n      - name: Download all reports\n        uses: actions/download-artifact@v4\n        with:\n          path: artifacts\n\n      - name: Arrange site directory\n        id: arrange\n        shell: bash\n        run: |\n          set -euo pipefail\n          if [ \"${{ github.event_name }}\" = \"pull_request\" ]; then\n            BASE=\"pr-${{ github.event.pull_request.number }}\"\n          else\n            BASE=\"main\"\n          fi\n          echo \"base=$BASE\" >> \"$GITHUB_OUTPUT\"\n\n          mkdir -p \"site/$BASE\"\n          found=\"\"\n          for os in ubuntu-latest macos-latest; do\n            src=\"artifacts/doctest-reports-$os\"\n            # Each OS produces one combined index.html \u2014 publish as-is.\n            if [ -f \"$src/index.html\" ]; then\n              mkdir -p \"site/$BASE/$os\"\n              cp \"$src/index.html\" \"site/$BASE/$os/index.html\"\n              found=\"$found $os\"\n            fi\n          done\n          echo \"found=$found\" >> \"$GITHUB_OUTPUT\"\n\n          # Landing page for this ref linking to each OS report.\n          {\n            echo \"<!doctype html><meta charset=utf-8>\"\n            echo \"<title>doc-test reports \u2014 $BASE<\/title>\"\n            echo \"<h1>doc-test reports<\/h1>\"\n            echo \"<p><strong>$BASE<\/strong> \u00b7 <code>${GITHUB_SHA::7}<\/code><\/p><ul>\"\n            for os in ubuntu-latest macos-latest; do\n              if [ -d \"site/$BASE/$os\" ]; then\n                echo \"<li><a href=\\\"./$os/\\\">$os<\/a><\/li>\"\n              fi\n            done\n            echo \"<\/ul>\"\n          } > \"site/$BASE/index.html\"\n\n      - name: Deploy to gh-pages\n        if: steps.arrange.outputs.found != ''\n        uses: peaceiris/actions-gh-pages@v4\n        with:\n          github_token: ${{ secrets.GITHUB_TOKEN }}\n          publish_dir: ./site\n          keep_files: true          # don't wipe other PRs' directories\n          commit_message: \"Publish doc-test reports for ${{ steps.arrange.outputs.base }}\"\n\n      - name: Comment on PR with report links\n        if: ${{ github.event_name == 'pull_request' && steps.arrange.outputs.found != '' }}\n        uses: actions/github-script@v7\n        with:\n          script: |\n            const base = \"${{ steps.arrange.outputs.base }}\";\n            const { owner, repo } = context.repo;\n            const root = `https://${owner}.github.io/${repo}/${base}`;\n            const oses = \"${{ steps.arrange.outputs.found }}\".trim().split(/\\s+/).filter(Boolean);\n            const links = oses.map(os => `- [\\`${os}\\` report](${root}/${os}/)`).join(\"\\n\");\n            const marker = \"<!-- doctest-report-links -->\";\n            const body =\n              `${marker}\\n### \ud83d\udcca doc-test reports\\n\\n` +\n              `Rendered docs alongside the commands actually run and their output:\\n\\n` +\n              `${links}\\n\\n_Pages can take a minute to update._`;\n            const { data: comments } = await github.rest.issues.listComments({\n              owner, repo, issue_number: context.issue.number, per_page: 100,\n            });\n            const existing = comments.find(c => c.body && c.body.includes(marker));\n            if (existing) {\n              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });\n            } else {\n              await github.rest.issues.createComment({ owner, repo, issue_number: context.issue.number, body });\n            }\n```", "execs": [{"kind": "file", "cmd": "write .github/workflows/doctests.yml", "status": "pass", "note": "Wrote .github/workflows/doctests.yml"}]}, {"md": "### 3.2 Assert the publishing-critical pieces are present\n\nWe can't run Actions here, but we can verify the file we just wrote\ncarries the parts that make publishing work \u2014 the combined-report `run`,\nthe Pages deploy action, and the gh-pages permission:\n\n```bash\ngrep -E 'actions-gh-pages|--report|contents: write' .github/workflows/doctests.yml\n```\n\nThose three lines are the spine of the workflow: `--report` produces the\nartifact, `contents: write` lets the publish job push to `gh-pages`, and\n`actions-gh-pages` does the push.", "execs": [{"kind": "run", "cmd": "grep -E 'actions-gh-pages|--report|contents: write' .github/workflows/doctests.yml | head", "status": "pass", "exit_code": 0, "output": "            --report \"${{ runner.temp }}/reports/index.html\"\n      contents: write          # push to the gh-pages branch\n        uses: peaceiris/actions-gh-pages@v4\n", "note": ""}]}, {"md": "## Turning on GitHub Pages (one-time)\n\nThe workflow creates the `gh-pages` branch on its first successful run, but\nGitHub only *serves* it once Pages is pointed at that branch. Do this once\nper repo:\n\n1. **Settings \u2192 Pages \u2192 Build and deployment \u2192 Source:** \"Deploy from a\n   branch\".\n2. **Branch:** `gh-pages`, folder `/ (root)`. Save.\n\nNo secrets to configure: the built-in `GITHUB_TOKEN` already has the\n`contents: write` and `pull-requests: write` permissions the publish job\ngrants. After the first run, each push and same-repo PR publishes to:\n\n```\nhttps://<owner>.github.io/<repo>/main/<os>/     # pushes to main/master\nhttps://<owner>.github.io/<repo>/pr-<N>/<os>/   # pull requests\n```\n\nand `keep_files: true` means each PR's directory coexists with the others\ninstead of overwriting them.", "execs": []}, {"md": "## The fork caveat\n\nOne limitation is worth stating plainly, because it shapes the whole\nworkflow. Pull requests opened **from forks** get a **read-only**\n`GITHUB_TOKEN`: such a job cannot push to `gh-pages` or post a PR comment.\nThe workflow handles this in two places, both seen above:\n\n- The `publish-report` job is guarded by\n  `github.event.pull_request.head.repo.fork != true`, so it simply does not\n  run for fork PRs \u2014 the per-OS **artifact** is still uploaded and\n  downloadable from the run's summary page.\n- The commit-resolution step blanks the SHA for forks, so the doc-tests build\n  against latest master rather than an unfetchable fork commit (Tutorial 4's\n  empty-ref fallback).\n\nSame-repo branch PRs and pushes to `main`/`master` get the full experience:\npublished Pages report and an auto-updating PR comment with the links. That\nis the same workflow `logos-package-manager`, `logos-liblogos`, and\n`logos-tutorial` run today \u2014 the end of the arc that began with a single\nspec: docs that verify themselves on every commit and publish the proof.", "execs": []}]}]}</script>
<script>
  const DATA = JSON.parse(document.getElementById("report-data").textContent);
  if (window.marked) { marked.setOptions({ gfm: true, breaks: false }); }
  const mdToHtml = (s) => window.marked ? marked.parse(s || "") : ("<pre>" + (s || "") + "</pre>");

  const sum = DATA.summary;
  document.getElementById("summary").innerHTML =
    `<span class="pill pass">${sum.passed} passed</span> ` +
    (sum.failed ? `<span class="pill fail">${sum.failed} failed</span> ` : "") +
    (sum.skipped ? `<span class="pill skip">${sum.skipped} skipped</span>` : "");

  const picker = document.getElementById("picker");
  DATA.tutorials.forEach((t, i) => {
    const o = document.createElement("option");
    o.value = i; o.textContent = t.meta.name; picker.appendChild(o);
  });

  function execHtml(e) {
    const badge = `<span class="badge ${e.status}">${e.status.toUpperCase()}</span>`;
    const kind = `<span class="kind">${e.kind}${e.exit_code !== undefined ? " · exit " + e.exit_code : ""}</span>`;
    let h = `<div class="exec"><div class="exec-head">${badge}${kind}</div>`;
    if (e.note) h += `<div class="note">${escapeHtml(e.note)}</div>`;
    if (e.cmd) h += `<pre class="cmd">${escapeHtml(e.cmd)}</pre>`;
    const out = (e.output || "").trim();
    if (out) {
      const long = out.split("\n").length > 12;
      if (long) {
        h += `<details><summary>output (${out.split("\n").length} lines)</summary><pre class="output">${escapeHtml(out)}</pre></details>`;
      } else {
        h += `<pre class="output">${escapeHtml(out)}</pre>`;
      }
    }
    h += `</div>`;
    return h;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
  }

  function render(idx) {
    const t = DATA.tutorials[idx];
    const main = document.getElementById("main");
    main.innerHTML = "";
    const h = document.createElement("div");
    h.className = "tutorial-title";
    h.textContent = t.meta.name + "  —  " + t.meta.platform;
    main.appendChild(h);

    t.rows.forEach(row => {
      const isStructural = row.execs.length === 0 &&
        (/^#\s|^##\s/.test(row.md.trim()));
      const div = document.createElement("div");
      const hasExec = row.execs.length > 0;
      const hasFail = row.execs.some(e => e.status === "fail");
      div.className = "row" + (hasExec ? "" : (isStructural ? " section" : " preamble")) +
        (hasFail ? " has-fail" : "");

      const left = document.createElement("div");
      left.className = "col left";
      left.innerHTML = `<div class="md">${mdToHtml(row.md)}</div>`;
      div.appendChild(left);

      if (hasExec || !isStructural) {
        const right = document.createElement("div");
        right.className = "col right";
        if (hasExec) {
          right.innerHTML = `<div class="col-label">Executed</div>` +
            row.execs.map(execHtml).join("");
        } else {
          right.innerHTML = `<div class="col-label">Executed</div>` +
            `<div class="empty">No commands run for this step.</div>`;
        }
        div.appendChild(right);
      }
      main.appendChild(div);
    });
  }

  function slug(s) {
    return String(s).toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");
  }
  function indexFromHash() {
    const raw = decodeURIComponent(location.hash.replace(/^#/, ""));
    if (!raw) return 0;
    if (/^\d+$/.test(raw) && +raw < DATA.tutorials.length) return +raw;
    const i = DATA.tutorials.findIndex(
      t => slug(t.meta.name) === raw || t.meta.name === raw
    );
    return i >= 0 ? i : 0;
  }
  function show(idx) { picker.value = idx; render(idx); }
  picker.addEventListener("change", () => {
    location.hash = slug(DATA.tutorials[+picker.value].meta.name);
    render(+picker.value);
  });
  window.addEventListener("hashchange", () => show(indexFromHash()));
  show(indexFromHash());
</script>
</body>
