<style>
  :root {

  * { box-sizing: border-box; }
  body {

  header {

  .tutorial-title { font-size: 20px; font-weight: 700; margin: 24px 0 8px; color: #fff; }
  .row {
    display: grid; grid-template-columns: 1fr 1fr; gap: 0;
    border: 1px solid var(--border); border-radius: 8px; margin: 10px 0; overflow: hidden;
  }
  .row.preamble, .row.section { grid-template-columns: 1fr; }
  .col { padding: 14px 18px; min-width: 0; }
  .col.left { border-right: 1px solid var(--border); }
  .row.preamble .col.left, .row.section .col.left { border-right: none; }
  .col.right { background: var(--panel); }
  /* A row containing any failed step is tinted red end-to-end so it's
     impossible to miss when scanning the report. */
  .row.has-fail { border-color: var(--fail); box-shadow: 0 0 0 1px var(--fail); }
  .row.has-fail .col.left { background: rgba(248,81,73,.07); border-right-color: var(--fail); }
  .row.has-fail .col.right { background: rgba(248,81,73,.12); }
  .col-label { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin-bottom: 8px; }
  .md :first-child { margin-top: 0; }
  .md h1 { font-size: 22px; } .md h2 { font-size: 18px; } .md h3 { font-size: 15px; }
  .md pre { background: var(--code-bg); border: 1px solid var(--border); border-radius: 6px; padding: 12px; overflow-x: auto; }
  .md code { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 12.5px; }
  .md :not(pre) > code { background: rgba(110,118,129,.2); padding: .15em .4em; border-radius: 4px; }
  .md table { border-collapse: collapse; margin: 8px 0; }
  .md th, .md td { border: 1px solid var(--border); padding: 5px 10px; }
  .md blockquote { border-left: 3px solid var(--border); margin: 8px 0; padding: 2px 12px; color: var(--muted); }
  .md img { width: 100%; height: auto; border: 1px solid var(--border); border-radius: 6px; }
  .exec { margin-bottom: 14px; }
  .exec:last-child { margin-bottom: 0; }
  .exec-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .badge { font-size: 11px; font-weight: 700; padding: 1px 8px; border-radius: 4px; }
  .badge.pass { background: rgba(46,160,67,.15); color: var(--pass); }
  .badge.fail { background: rgba(248,81,73,.15); color: var(--fail); }
  .badge.info { background: rgba(210,153,34,.15); color: var(--info); }
  .kind { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
  .note { color: var(--muted); font-size: 12.5px; margin-bottom: 6px; }
  pre.cmd { background: var(--code-bg); border: 1px solid var(--border); border-left: 3px solid var(--accent); border-radius: 6px; padding: 10px 12px; margin: 0 0 6px; overflow-x: auto; white-space: pre-wrap; word-break: break-word; }
  pre.output { background: #010409; border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; margin: 0; overflow-x: auto; max-height: 360px; overflow-y: auto; color: #b9c1ca; }
  pre.cmd, pre.output { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px; line-height: 1.45; }
  .empty { color: var(--muted); font-style: italic; font-size: 12.5px; }
  details summary { cursor: pointer; color: var(--accent); font-size: 12px; margin-bottom: 4px; }
</style>

lake bundles Python + PyYAML, so you do not install anything else.", "execs": []}, {"md": "## Step 1: Meet the CLI\n\n`doctest` has three subcommands: `run` (execute a spec), `generate` (render\nit to Markdown), and `clean` (strip an executed tree back to source). You\ninvoke it through its flake \u2014 nothing to install.", "execs": []}, {"md": "### 1.1 Confirm doctest is reachable\n\nRun the CLI with no arguments. It prints usage and exits non-zero, so we\nappend `|| true` to let the doc-test continue and assert on the banner:\n\n```bash\ndoctest\n```\n\nThroughout this tutorial, `doctest \u2026` in the rendered commands means\n`nix run github:logos-co/logos-doctest -- \u2026`.", "execs": [{"kind": "run", "cmd": "nix run github:logos-co/logos-doctest/64c6711f314272c320c75a2f4ef6da3c545e2f28 -- 2>&1 || true", "status": "pass", "exit_code": 0, "output": "unpacking 'github:logos-co/logos-doctest/64c6711f314272c320c75a2f4ef6da3c545e2f28' into the Git cache...\nusage: doctest [-h] {run,generate,clean} ...\ndoctest: error: the following arguments are required: command\n", "note": ""}]}, {"md": "## Step 2: Write your first spec\n\nA spec is YAML with a top-level `name`, an `output` filename (used by\n`generate`), and an ordered list of `sections`, each holding ordered\n`steps`. We will write the smallest useful spec: it creates a file, reads\nit back, and asserts on the output.", "execs": []}, {"md": "### 2.1 Create greeting.test.yaml\n\nThe `file` step writes a file during `run` (and shows it as a code block\nwhen rendered). The `run` step executes a command; its `expect_contains`\nlist asserts that each string appears in the command's output. The\n`check_file` step asserts a path exists.\n\n```yaml\nname: \"A greeting\"\noutput: greeting.md\n\nintro: |\n  The smallest useful spec: write a file, read it back, assert on it.\n\nsections:\n  - title: \"Write and verify a greeting\"\n    step: true\n    steps:\n      - title: \"Write greeting.txt\"\n        file:\n          path: greeting.txt\n          language: text\n          content: |\n            Hello from an inner spec!\n\n      - title: \"Read it back and assert\"\n        run: \"cat greeting.txt\"\n        expect_contains:\n          - \"Hello from an inner spec!\"\n\n      - title: \"Confirm the file exists\"\n        check_file: \"greeting.txt\"\n```\n\nThree step types, three jobs: `file` produces an artifact, `run`\nexercises it, `check_file` confirms it. That is the whole core loop.", "execs": [{"kind": "file", "cmd": "write greeting.test.yaml", "status": "pass", "note": "Wrote greeting.test.yaml"}]}, {"md": "## Step 3: Run the spec\n\n`doctest run` executes the spec in an isolated temporary directory, walking\nsections and steps top to bottom and checking every assertion as it goes.", "execs": []}, {"md": "### 3.1 Execute it with --verbose\n\n`--verbose` echoes each command as it runs. Watch for the `PASS` lines\nand the final results summary:\n\n```bash\ndoctest run greeting.test.yaml --verbose\n```\n\nTwo steps asserted (the `run` and the `check_file`); the `file` step\nwrites without asserting. A run where every assertion holds exits `0`;\nany failure makes `doctest run` exit non-zero, which is what lets CI\nfail when the docs drift from reality.", "execs": [{"kind": "run", "cmd": "nix run github:logos-co/logos-doctest/64c6711f314272c320c75a2f4ef6da3c545e2f28 -- run greeting.test.yaml --verbose", "status": "pass", "exit_code": 0, "output": "=================================================================\n Doctest: A greeting\n=================================================================\n\n  spec     : /tmp/doctest-test-a3t62q49/greeting.test.yaml\n  workdir  : /tmp/doctest-test-2nj76o22\n  platform : Linux (ext=so)\n  release  : (none)\n\n-----------------------------------------------------------------\n Section: Write and verify a greeting\n-----------------------------------------------------------------\n  wrote   greeting.txt\n        cmd: cat greeting.t ng.txt\n```\n\n### 1.3 Confirm the file exists\n", "note": ""}]}]}, {"meta": {"name": "Rendering, reports, and failures", "platform": "Linux (ext=so)", "release": "(none)"}, "rows": [{"md": "# Rendering, reports, and failures\n\nThe first tutorial covered the `run` / `generate` loop. This one goes deeper on\nthe *rendering* side: how to show readers a clean command while executing a\ndifferent one (`code_block`), how to capture an entire run as a shareable HTML\n**report**, and how `--continue-on-fail` changes what happens when an assertion\nfails. As before, every command here is run by the outer `doctest`, and inside\nit we author and drive a second spec.\n\n**What you'll build:** A spec with display-only command blocks, plus an HTML report of a run that contains a deliberate failure.\n\n**What you'll learn:**\n\n- How `code_block` shows a tidy command while `run` executes the real one\n- How `post_text` adds explanation after a step's action\n- How `--report` writes a self-contained two-column HTML report\n- How a failing `expect_contains` is reported, and its effect on the exit code\n- How `--continue-on-fail` walks the whole spec instead of stopping early\n- How `--tui` / `--iterative` show the same view live in the terminal\n\n## Prerequisites\n\n- **Nix** with flakes enabled (see the first tutorial). The `doctest` flake\nbundles everything else.", "execs": []}, {"md": "## Step 1: Display vs. execution with code_block (and extra_run)\n\nDuring `run`, a step's `run:` value is what executes. But the command that\nis convenient to *run* is not always the one that is clearest to *read* \u2014 a\nrun might use an absolute path, a `|| true` guard, or shell plumbing. The\n`code_block:` field overrides what `generate` shows, while `run:` stays the\nthing that executes. A step can also carry an `extra_run:` \u2014 a *second*\ncommand (with its own `run` / `code_block` / `post_text`) rendered under the\nsame heading, ideal for a \"do X, then verify X\" pair.", "execs": []}, {"md": "### 1.1 Write a spec that separates display from execution\n\nThe inner step *runs* a command with extra shell noise but *renders* a\nclean one, with `post_text` after it. Its `extra_run` adds a follow-up\ncommand under the same heading \u2014 no new `### ` title.\n\n```yaml\nname: \"Rendering details\"\noutput: render.md\n\nsections:\n  - title: \"A friendly command\"\n    step: true\n    steps:\n      - title: \"Print the date\"\n        run: \"date '+%Y' > /dev/null && echo 'the year is now'\"\n        code_block: \"date '+%Y'\"\n        expect_contains:\n          - \"the year is now\"\n        post_text: |\n          The command above is what readers see; the spec actually ran\n          a slightly different line to keep this example deterministic.\n        extra_run:\n          run: \"echo 'and the follow-up ran too'\"\n          expect_contains:\n            - \"follow-up ran too\"\n          post_text: |\n            This second command came from `extra_run`, under the same\n            step heading.\n```", "execs": [{"kind": "file", "cmd": "write render.test.yaml", "status": "pass", "note": "Wrote render.test.yaml"}]}, {"md": "### 1.2 Run it (executes both the command and its extra_run)\n\n```bash\ndoctest run render.test.yaml --verbose\n```\n\nThe summary shows **two** passes for one step: the main `run` and the\n`extra_run` (logged as `\u2026 (verify)`).", "execs": [{"kind": "run", "cmd": "nix run github:logos-co/logos-doctest/64c6711f314272c320c75a2f4ef6da3c545e2f28 -- run render.test.yaml --verbose", "status": "pass", "exit_code": 0, "output": "=================================================================\n Doctest: Rendering details\n=================================================================\n\n  spec     : /tmp/doctest-test-e61bo__q/render.test.yaml\n  workdir  : /tmp/doctest-test-046awb9o\n  platform : Linux (ext=so)\n  release  : (none)\n\n-----------------------------------------------------------------\n Section: A friendly command\n-----------------------------------------------------------------\n        cmd: date '+%Y' > /dev/null && echo 'the year is now'\n  PASS  Print the date\n        cmd: echo 'and the follow-up ran too'\n  PASS  Print the date (verify)\n\n\n=================================================================\n Results: 2 passed, 0 failed, 0 skipped (of 2 run)\n=================================================================\n\n", "note": ""}]}, {"md": "### 1.3 Generate it (shows the clean commands)\n\nIn the rendered Markdown the code block is the *display* command, the\n`post_text` follows it, and the `extra_run` command appears under the\nsame heading \u2014 the executed plumbing never leaks into the docs:\n\n```bash\ndoctest generate render.test.yaml -o render.md\n```\n\nNote that `date '+%Y' > /dev/null && echo \u2026` (the executed line) does\n**not** appear \u2014 only the `code_block` does \u2014 and the `extra_run` command\nrenders inline, with no separate heading of its own.", "execs": [{"kind": "run", "cmd": "nix run github:logos-co/logos-doctest/64c6711f314272c320c75a2f4ef6da3c545e2f28 -- generate render.test.yaml -o render.md && cat render.md", "status": "pass", "exit_code": 0, "output": "Generated: /tmp/doctest-test-e61bo__q/render.md\n# Rendering details\n\n## Step 1: A friendly command\n\n### 1.1 Print the date\n\n```bash\ndate '+%Y'\n```\n\nThe command above is what readers see; the spec actually ran\na slightly different line to keep this example deterministic.\n\n```bash\necho 'and the follow-up ran too'\n```\n\nThis second command came from `extra_run`, under the same\nstep heading.\n", "note": ""}]}, {"md": "## Step 2: Capture a run as an HTML report\n\n`--report PATH` writes a self-contained HTML file with two columns per step:\nthe rendered documentation on the left, and the commands actually executed\nplus their output (with pass/fail badges) on the right. It is the artifact\nCI publishes so reviewers can see exactly what ran.", "execs":
